<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Palatino Linotype',Palatino,Georgia,serif;background:linear-gradient(135deg,#080614 0%,#0d0a1e 50%,#150e2e 100%);color:#e8e0d0;min-height:100vh;overflow-x:hidden;}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.9}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.star{position:fixed;border-radius:50%;pointer-events:none;animation:twinkle var(--d) ease-in-out infinite;animation-delay:var(--delay);}
.fade-in{animation:fadeIn 0.4s ease forwards;}
.planet-symbol{animation:pulse 3s ease-in-out infinite;}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:18px;margin-bottom:12px;}
.lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#C9A84C;margin-bottom:10px;display:block;}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;}
.row:last-child{border-bottom:none;}
.row-label{color:#7a6e8a;}
.row-val{color:#c8bfdf;text-align:right;}
.pill{display:inline-block;padding:4px 11px;border-radius:20px;font-size:12px;margin:3px;}
#stars-container{position:fixed;inset:0;pointer-events:none;z-index:0;}
#wrapper{position:relative;z-index:1;max-width:460px;width:100%;margin:0 auto;padding:16px 14px 90px;}

.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:13px 4px;background:none;border:none;border-top:2px solid transparent;color:#3a3050;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;transition:color 0.2s;}
.nav-btn.active{color:#C9A84C;border-top-color:#C9A84C;}
.nav-icon{font-size:20px;line-height:1;margin-bottom:3px;}
.nav-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;}
textarea{resize:none;font-family:inherit;width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px;color:#e8e0d0;font-size:14px;line-height:1.6;}
textarea:focus{outline:none;border-color:#C9A84C;}
input[type="time"]{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#e8e0d0;font-family:inherit;font-size:14px;padding:9px 12px;width:100%;margin-bottom:8px;}
input[type="time"]:focus{outline:none;border-color:#C9A84C;}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#2d1f6e,#1a1035);border:1px solid rgba(201,168,76,0.4);border-radius:12px;color:#C9A84C;font-size:12px;letter-spacing:.1em;cursor:pointer;font-family:inherit;text-transform:uppercase;touch-action:manipulation;-webkit-appearance:none;}
.hour-row{display:flex;align-items:center;padding:8px 10px;border-radius:10px;margin-bottom:5px;gap:10px;}
.hour-row.current{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);}
.hour-row.past{opacity:.4;}
.hour-num{font-size:11px;color:#7a6e8a;width:22px;flex-shrink:0;}
.hour-time{font-size:12px;color:#7a6e8a;width:60px;flex-shrink:0;}
.hour-sym{font-size:15px;width:20px;flex-shrink:0;}
.hour-planet{font-size:13px;flex:1;}
.hour-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(201,168,76,0.15);color:#C9A84C;flex-shrink:0;}
.feeling-btn{display:inline-block;padding:8px 14px;border-radius:20px;font-size:13px;margin:4px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#9d8fbf;cursor:pointer;font-family:inherit;touch-action:manipulation;transition:all 0.2s;}
.feeling-btn.selected{background:rgba(201,168,76,0.15);border-color:rgba(201,168,76,0.4);color:#C9A84C;}
.lock-card{background:rgba(255,255,255,0.02);border:1px solid rgba(201,168,76,0.25);border-radius:16px;padding:18px;margin-bottom:12px;}
.tier-badge{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;margin-left:8px;vertical-align:middle;}
.seeker-badge{background:rgba(138,75,200,0.2);color:#b085e8;border:1px solid rgba(138,75,200,0.3);}
.initiate-badge{background:rgba(201,168,76,0.15);color:#C9A84C;border:1px solid rgba(201,168,76,0.3);}

<script>
// Stars
const sc=document.getElementById('stars-container');
for(let i=0;i<55;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()>.8?2:1;s.style.cssText=`width:${sz}px;height:${sz}px;background:#fff;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*.6+.1};--d:${2+Math.random()*3}s;--delay:${Math.random()*3}s;`;sc.appendChild(s);}

const CHALDEAN=['Saturn','Jupiter','Mars','Sun','Venus','Mercury','Moon'];
const DAY_IDX=[3,6,2,5,1,4,0];

// Planet colors and data
const P={
  Saturn:{sym:'♄',col:'#8B7355',energy:'Discipline, exposure, endings & banishing',bestFor:'Breaking cycles, banishing negative spirits, exposing hidden enemies and breaking generational curses',psalm:'Psalm 10',psalms:['Psalm 10','Psalm 35','Psalm 52'],candle:'Black or dark blue',herb:'Hyssop',oil:'Myrrh',crystal:'Black Tourmaline'},
  Jupiter:{sym:'♃',col:'#C9A84C',energy:'Expansion, abundance & divine favor',bestFor:'Attracting abundance, opening doors, financial blessings and favor with those in authority',psalm:'Psalm 65',psalms:['Psalm 65','Psalm 72','Psalm 23'],candle:'Green or gold',herb:'Cinnamon',oil:'Frankincense',crystal:'Citrine'},
  Mars:{sym:'♂',col:'#C0392B',energy:'Courage, strength & victory',bestFor:'Protection, spiritual warfare, legal matters, court cases and commanding victory',psalm:'Psalm 91',psalms:['Psalm 91','Psalm 35','Psalm 121'],candle:'Red or orange',herb:'Rosemary',oil:"Dragon's Blood",crystal:'Red Jasper'},
  Sun:{sym:'☉',col:'#F39C12',energy:'Success, power & recognition',bestFor:'Career advancement, confidence, leadership, visibility and stepping into divine purpose',psalm:'Psalm 19',psalms:['Psalm 19','Psalm 8','Psalm 118'],candle:'Yellow or gold',herb:'Bay Leaf',oil:'Frankincense',crystal:'Sunstone'},
  Venus:{sym:'♀',col:'#E91E8C',energy:'Love, harmony & sweetness',bestFor:'Attracting love, healing relationships, sweetening your aura and drawing good people toward you',psalm:'Psalm 45',psalms:['Psalm 45','Psalm 23','Psalm 65'],candle:'Pink or rose',herb:'Rose Petals',oil:'Rose Oil',crystal:'Rose Quartz'},
  Mercury:{sym:'☿',col:'#8E44AD',energy:'Communication, clarity & truth',bestFor:'Contracts, clarity of mind, breaking confusion, speaking truth and cutting through deception',psalm:'Psalm 19',psalms:['Psalm 19','Psalm 12','Psalm 34'],candle:'Yellow or light blue',herb:'Lavender',oil:'Eucalyptus',crystal:'Blue Lace Agate'},
  Moon:{sym:'☽',col:'#BDC3C7',energy:'Intuition, emotions & cleansing',bestFor:'Spiritual cleansing, dream work, emotional healing, deepening intuition and releasing what no longer serves',psalm:'Psalm 51',psalms:['Psalm 51','Psalm 4','Psalm 61'],candle:'White or silver',herb:'Hyssop',oil:'Coconut Oil',crystal:'Moonstone'},
};

// Moon phase colors
const MOON_COLORS={
  'New Moon':'#2C2C3E',
  'Waxing Crescent':'#7C7C9C',
  'First Quarter':'#9B8FAE',
  'Waxing Gibbous':'#B8A9C9',
  'Full Moon':'#E8E4F0',
  'Waning Gibbous':'#9B8FAE',
  'Last Quarter':'#7C7C9C',
  'Waning Crescent':'#5C5470',
};

// Zodiac sign colors by element
function getSignColor(sign){
  const fire=['Aries','Leo','Sagittarius'];
  const earth=['Taurus','Virgo','Capricorn'];
  const air=['Gemini','Libra','Aquarius'];
  if(fire.includes(sign))return'#C9784C';
  if(earth.includes(sign))return'#6B8F71';
  if(air.includes(sign))return'#6B8FAF';
  return'#4C8F8F'; // water
}

function getSignElement(sign){
  const fire=['Aries','Leo','Sagittarius'];
  const earth=['Taurus','Virgo','Capricorn'];
  const air=['Gemini','Libra','Aquarius'];
  if(fire.includes(sign))return'Fire';
  if(earth.includes(sign))return'Earth';
  if(air.includes(sign))return'Air';
  return'Water';
}

const MOON_PHASES=[
  {name:'New Moon',sym:'🌑',meaning:'New beginnings. Set your intentions tonight. The slate is clear — what do you call in?',col:'#2C2C3E'},
  {name:'Waxing Crescent',sym:'🌒',meaning:'Growth energy is building. Call in what you desire and take the first step.',col:'#7C7C9C'},
  {name:'First Quarter',sym:'🌓',meaning:'Take action. Push through resistance. The universe rewards bold movement now.',col:'#9B8FAE'},
  {name:'Waxing Gibbous',sym:'🌔',meaning:'Refinement. Strengthen your intentions and fine tune what you are building.',col:'#B8A9C9'},
  {name:'Full Moon',sym:'🌕',meaning:'Peak power. Release what no longer serves. Illuminate what has been hidden.',col:'#E8E4F0'},
  {name:'Waning Gibbous',sym:'🌖',meaning:'Gratitude. Reflect on what was gained and share your wisdom with others.',col:'#9B8FAE'},
  {name:'Last Quarter',sym:'🌗',meaning:'Release and banish. Let go deeply. Cut what is draining your energy.',col:'#7C7C9C'},
  {name:'Waning Crescent',sym:'🌘',meaning:'Rest and restore. Cleanse your energy and prepare for the new cycle.',col:'#5C5470'},
];

// Moon sign calculation (approximate)
function getMoonSign(date){
  const signs=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  const syms=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
  const ref=new Date('2026-05-16T03:00:00Z').getTime();
  const daysSince=(date.getTime()-ref)/86400000;
  const idx=Math.floor(((daysSince/27.321661*12)+1))%12;
  const i=((idx%12)+12)%12;
  return{name:signs[i],sym:syms[i]};
}

const FEELING_GROUPS=[
  {group:'── HEAVY EMOTIONS ──',feelings:[]},
  {group:null,feelings:['Angry','Fearful','Desperate','Despairing','Grief stricken','Hopeless','Numb','Bitter','Resentful']},
  {group:'── ANXIOUS EMOTIONS ──',feelings:[]},
  {group:null,feelings:['Anxious','Overwhelmed','Scattered','Restless','Unsettled','On edge','Disconnected']},
  {group:'── LOW ENERGY ──',feelings:[]},
  {group:null,feelings:['Heavy','Drained','Exhausted','Blocked','Stuck','Lost']},
  {group:'── NEUTRAL / PROCESSING ──',feelings:[]},
  {group:null,feelings:['Confused','Searching','Uncertain','Reflective']},
  {group:'── POSITIVE EMOTIONS ──',feelings:[]},
  {group:null,feelings:['Peaceful','Grateful','Centered','Clear','Hopeful','Energized','Grounded']},
];

// Shadow work prompts
const SHADOW_PROMPTS=[
  'Think back to a moment when you felt you had to be a certain way to receive love. How does that version of you still show up today?',
  'When someone is disappointed in you what is your immediate response — and where do you think that response was first learned?',
  'Describe the type of person you are most drawn to in relationships. What familiar feeling do they recreate for you?',
  'Where in your life do you consistently undervalue yourself or over explain your needs? What belief is sitting underneath that?',

  'Notice where you give more than you receive. What did you once believe would happen if you stopped?',
  'What would you do differently today if you truly believed you were protected and worthy of good things?',
];

const HERBS_DAY={
  Saturn:{name:'Hyssop',props:'Deep spiritual purification. Clears what has been sent against you and breaks stagnant cycles.'},
  Jupiter:{name:'Cinnamon',props:'Draws abundance and favor. One of the oldest prosperity herbs known to ancient traditions.'},
  Mars:{name:'Rosemary',props:'Protection and strength. Clears negative energy and fortifies your spiritual armor.'},
  Sun:{name:'Bay Leaf',props:'Victory and recognition. Write your intention on it — the Sun hour carries it forward.'},
  Venus:{name:'Rose Petals',props:'Love, harmony and sweetness. Opens the heart and softens what has been hardened.'},
  Mercury:{name:'Lavender',props:'Clarity and truth. Clears mental confusion and helps you speak and see clearly.'},
  Moon:{name:'Mugwort',props:'Deep intuition and dream wisdom. Opens the inner eye and purifies the emotional body.'},
};

let sunData=null,currentPlanet=null,currentHourNum=1,isDay=true,journalEntries=[];

function getMoonPhase(d){
  // Known new moon reference: May 16, 2026
  const ref=new Date('2026-05-16T03:00:00Z').getTime();
  const daysSince=(d.getTime()-ref)/86400000;
  let b=(daysSince%29.530588861)/29.530588861;
  if(b<0)b+=1;
  return MOON_PHASES[Math.round(b*8)%8];
}

function calcPlanet(sunrise,sunset){
  const now=new Date(),dow=now.getDay(),dIdx=DAY_IDX[dow];
  const srMs=sunrise.getTime(),ssMs=sunset.getTime(),nowMs=now.getTime();
  let hourNum,pIdx;
  if(nowMs>=srMs&&nowMs<ssMs){
    isDay=true;
    const hLen=(ssMs-srMs)/12;
    hourNum=Math.min(12,Math.floor((nowMs-srMs)/hLen)+1);
    pIdx=(dIdx+hourNum-1)%7;
  }else{
    isDay=false;
    let nightStart,nIdx;
    if(nowMs<srMs){const yd=new Date(now);yd.setDate(yd.getDate()-1);nIdx=DAY_IDX[yd.getDay()];const ys=new Date(sunset);ys.setDate(ys.getDate()-1);nightStart=ys.getTime();}
    else{nIdx=dIdx;nightStart=ssMs;}
    const nextSr=new Date(sunrise);nextSr.setDate(nextSr.getDate()+1);
    const nhLen=(nextSr.getTime()-nightStart)/12;
    hourNum=Math.min(12,Math.floor((nowMs-nightStart)/nhLen)+1);
    pIdx=(nIdx+12+hourNum-1)%7;
  }
  currentHourNum=hourNum;currentPlanet=CHALDEAN[pIdx];
}

function build12Hours(sunrise,sunset){
  const now=new Date(),dow=now.getDay(),dIdx=DAY_IDX[dow];
  const srMs=sunrise.getTime(),ssMs=sunset.getTime(),nowMs=now.getTime();
  const hLen=(ssMs-srMs)/12;
  let rows='';
  for(let i=1;i<=12;i++){
    const startMs=srMs+(i-1)*hLen;
    const startDate=new Date(startMs);
    const planet=CHALDEAN[(dIdx+i-1)%7];
    const p=P[planet];
    const isCurrent=isDay&&i===currentHourNum;
    const isPast=nowMs>startMs+hLen&&!isCurrent;
    rows+=`<div class="hour-row${isCurrent?' current':''}${isPast?' past':''}">
      <span class="hour-num">${i}</span>
      <span class="hour-time">${startDate.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
      <span class="hour-sym" style="color:${p.col}">${p.sym}</span>
      <span class="hour-planet" style="color:${isCurrent?'#C9A84C':'#c8bfdf'}">${planet}</span>
      ${isCurrent?'<span class="hour-badge">Now</span>':''}
    </div>`;
  }
  return rows;
}

function fmtTime(d){if(!d)return'';return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

function updateClock(){const now=new Date();const el=document.getElementById('clock');if(el)el.textContent=`${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()]} · ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;}
setInterval(updateClock,60000);updateClock();



function renderHora(){
  const tab=document.getElementById('hora-tab');
  if(!currentPlanet){
    const tzOptions=TIMEZONES.map((tz,i)=>{
      if(tz.lat===null)return`<option disabled style="color:#C9A84C;background:#1a1035;font-weight:bold">${tz.label}</option>`;
      return`<option value="${i}" style="color:#e8e0d0;background:#1a1035">${tz.label}</option>`;
    }).join('');
    tab.innerHTML=`
      <div style="text-align:center;padding:24px 0 20px">
        <div style="font-size:64px;margin-bottom:12px;filter:drop-shadow(0 0 24px #C9A84C90)">✦</div>
        <div style="font-size:20px;color:#e8e0d0;margin-bottom:8px;letter-spacing:.03em">Welcome to Viriditas Hora</div>
        <div style="font-size:13px;color:#c8bfdf;font-style:italic;line-height:1.7">The living power of the hour<br>begins with knowing where the sun rises for you.</div>
      </div>

      <div class="card" style="border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.04)">
        <span class="lbl">Your Location</span>
        <div style="font-size:14px;color:#c8bfdf;margin-bottom:18px;line-height:1.8">
          Viriditas Hora needs your location to calculate your exact planetary hours.<br><br>
          Every location on Earth carries a different energy at a different time — your hours are specific to where you are.<br><br>
          <span style="color:#e8e0d0;font-style:italic">Your location is never stored or shared.</span>
        </div>
        <button class="btn" onclick="useGeolocation()" style="background:linear-gradient(135deg,#2d1f6e,#1a1035);border-color:rgba(201,168,76,0.6);font-size:13px;padding:15px">
          ✦ &nbsp; Allow Location to Reveal My Planetary Hours
        </button>
      </div>`;
    return;
  }
  const p=P[currentPlanet];
  const hourList=sunData?build12Hours(sunData.sunrise,sunData.sunset):'';
  tab.innerHTML=`
    <div class="fade-in">
      <!-- Hero -->
      <div style="background:rgba(255,255,255,0.03);border:1px solid ${p.col}40;border-radius:18px;padding:22px 18px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden">
        <div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,${p.col}15 0%,transparent 70%);pointer-events:none"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-size:11px;letter-spacing:.15em;color:#7a6e8a;text-transform:uppercase">${isDay?'☀ Daytime':'☾ Nighttime'} · Hour ${currentHourNum} of 12</div>
          <button onclick="resetTimezone()" style="font-size:10px;color:#C9A84C;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);border-radius:20px;padding:3px 10px;cursor:pointer;font-family:inherit;letter-spacing:.05em">Change ▾</button>
        </div>
        <div class="planet-symbol" style="font-size:72px;line-height:1;color:${p.col};text-shadow:0 0 40px ${p.col}70;margin-bottom:8px">${p.sym}</div>
        <div style="font-size:23px;color:#e8e0d0;letter-spacing:.04em;margin-bottom:4px">${currentPlanet} Hour</div>
        <div style="font-size:13px;color:#9d8fbf;font-style:italic;margin-bottom:14px">${p.energy}</div>
        <div style="background:${p.col}15;border-radius:12px;padding:12px 14px;text-align:left">
          <div style="font-size:10px;letter-spacing:.15em;color:${p.col};text-transform:uppercase;margin-bottom:5px">Best used for</div>
          <div style="font-size:13px;color:#c8bfdf;line-height:1.6">${p.bestFor}</div>
        </div>
      </div>

      <!-- Sunrise Sunset -->
      ${sunData?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="card" style="text-align:center;padding:14px;margin-bottom:0">
          <div style="font-size:18px;margin-bottom:3px">☀</div>
          <div style="font-size:10px;letter-spacing:.12em;color:#7a6e8a;text-transform:uppercase">Sunrise</div>
          <div style="font-size:15px;color:#C9A84C;margin-top:2px">${fmtTime(sunData.sunrise)}</div>
        </div>
        <div class="card" style="text-align:center;padding:14px;margin-bottom:0">
          <div style="font-size:18px;margin-bottom:3px">☾</div>
          <div style="font-size:10px;letter-spacing:.12em;color:#7a6e8a;text-transform:uppercase">Sunset</div>
          <div style="font-size:15px;color:#C9A84C;margin-top:2px">${fmtTime(sunData.sunset)}</div>
        </div>
      </div>`:''}

      <!-- Free tools -->
      <div class="card">
        <span class="lbl">This Hour — Your Tools</span>
        <div class="row"><span class="row-label">📖 Psalm</span><span class="row-val" style="color:${p.col}">${p.psalm}</span></div>
        <div class="row"><span class="row-label">🕯 Candle</span><span class="row-val">${p.candle}</span></div>
        <div class="row"><span class="row-label">🌿 Herb</span><span class="row-val">${p.herb}</span></div>
      </div>

      <!-- Full 12 hours free -->
      ${sunData?`<div class="card">
        <span class="lbl">Your 12 Planetary Ruling Hours</span>
        ${hourList}
      </div>`:''}

}

function switchTab(name){
  ['hora','moon','journal'].forEach(t=>{
    document.getElementById(t+'-tab').style.display=t===name?'block':'none';
    document.getElementById('btn-'+t).classList.toggle('active',t===name);
  });
  if(name==='moon')renderMoon();
  if(name==='journal')renderJournal();
}

// Fetch accurate sunrise/sunset from API using city coordinates
function fetchSunTimes(lat, lng, callback){
  fetch('https://api.sunrise-sunset.org/json?lat='+lat+'&lng='+lng+'&date=today&formatted=0')
    .then(r=>r.json())
    .then(d=>{
      if(d.status==='OK'){
        const sr=new Date(d.results.sunrise);
        const ss=new Date(d.results.sunset);
        callback(sr,ss);
      } else { callback(null,null); }
    }).catch(()=>callback(null,null));
}

  document.getElementById('hora-tab').innerHTML=`
    <div style="text-align:center;padding:60px 0;color:#5a4e7a">

    </div>`;
  fetchSunTimes(tz.lat,tz.lng,function(sr,ss){

      sunData={sunrise:sr,sunset:ss};

      // Fallback if API fails

      calcPlanet(s,e);

function useGeolocation(){
  document.getElementById('hora-tab').innerHTML=`
    <div style="text-align:center;padding:60px 0;color:#5a4e7a">

      <div style="font-size:13px;letter-spacing:.1em;color:#c8bfdf">Reading your position...</div>
    </div>`;
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      fetch('https://api.sunrise-sunset.org/json?lat='+pos.coords.latitude+'&lng='+pos.coords.longitude+'&date=today&formatted=0')
        .then(r=>r.json()).then(d=>{
          if(d.status==='OK'){
            const sr=new Date(d.results.sunrise);
            const ss=new Date(d.results.sunset);
            sunData={sunrise:sr,sunset:ss};
            calcPlanet(sr,ss);
          }
          renderHora();
        }).catch(()=>{sunData=null;renderHora();});
    },()=>{
      alert('Location access was denied. Please choose your region below.');
      sunData=null;renderHora();
    });
  } else {
    alert('Location not available on this device. Please choose your region below.');
    sunData=null;renderHora();
  }
}
