*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;}
html,body{height:100%;height:-webkit-fill-available;}
body{font-family:'Palatino Linotype',Palatino,Georgia,serif;background:#080614;color:#e8e0d0;min-height:100vh;overflow-x:hidden;}
@keyframes twinkle{0%,100%{opacity:.06}50%{opacity:.6}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-100%)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-100%)}}
.star{position:fixed;border-radius:50%;pointer-events:none;animation:twinkle var(--d) ease-in-out infinite;animation-delay:var(--delay);}
.fade-in{animation:fadeIn 0.4s ease forwards;}
.planet-pulse{animation:pulse 3.5s ease-in-out infinite;}
.float{animation:float 4s ease-in-out infinite;}
.card{background:rgba(255,255,255,0.034);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:18px;margin-bottom:12px;}
.lbl{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#C9A84C;margin-bottom:10px;display:block;}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:13px;gap:8px;}
.row:last-child{border-bottom:none;}
.row-l{color:#c8bfdf;flex:1;line-height:1.4;}
.row-r{color:#e8e0d0;text-align:right;flex-shrink:0;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;max-width:440px;width:100%;margin:0 auto;padding:12px 13px calc(72px + env(safe-area-inset-bottom));}

/* 4-tab nav */

.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 2px;background:none;border:none;border-top:2px solid transparent;color:#252040;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;transition:color 0.2s;min-height:52px;width:100%;}
.nav-btn.active{color:#C9A84C;border-top-color:#C9A84C;}
.nav-icon{font-size:17px;line-height:1;margin-bottom:2px;}
.nav-lbl{font-size:8px;letter-spacing:.1em;text-transform:uppercase;}

.btn{width:100%;padding:13px;background:linear-gradient(135deg,#2d1f6e,#1a1035);border:1px solid rgba(201,168,76,0.4);border-radius:12px;color:#C9A84C;font-size:13px;letter-spacing:.07em;cursor:pointer;font-family:inherit;text-transform:uppercase;touch-action:manipulation;-webkit-appearance:none;transition:opacity 0.15s;}
.btn:active{opacity:0.75;}
textarea{resize:none;font-family:inherit;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:14px;color:#e8e0d0;font-size:15px;line-height:1.6;-webkit-appearance:none;display:block;}
textarea:focus{outline:none;border-color:#C9A84C;}
input{width:100%;background:#0f0d24;border:1px solid rgba(201,168,76,0.22);border-radius:10px;padding:13px 14px;color:#e8e0d0;font-size:15px;font-family:inherit;-webkit-appearance:none;display:block;margin-bottom:10px;}
input:focus{outline:none;border-color:#C9A84C;}

/* Hour rows — clear and readable */
.hr-row{display:flex;align-items:center;padding:9px 10px;border-radius:10px;margin-bottom:5px;gap:10px;background:rgba(255,255,255,0.025);border:1px solid transparent;}
.hr-row.cur{background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.3);}
.hr-row.past{opacity:.5;}
.hr-row.fut{opacity:.6;}
.hr-n{font-size:11px;color:#6a5e8a;width:20px;flex-shrink:0;text-align:right;}
.hr-t{font-size:12px;color:#9d8fbf;width:58px;flex-shrink:0;}
.hr-s{font-size:15px;width:20px;flex-shrink:0;}
.hr-p{font-size:13px;flex:1;color:#c8bfdf;}
.hr-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(201,168,76,0.15);color:#C9A84C;flex-shrink:0;}

.pillar-b{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.05em;}

// Moon
function getMoonPhase(d){
  const ref=new Date('2026-05-16T03:00:00Z').getTime();
  let b=((d.getTime()-ref)/86400000%29.530588861)/29.530588861;
  if(b<0)b+=1;
  const idx=Math.round(b*8)%8;
  return{...MOON_PHASES[idx],illum:Math.round((1-Math.cos(b*2*Math.PI))/2*100)};
}
function getMoonSign(d){
  const signs=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  const syms=['\u2648','\u2649','\u264a','\u264b','\u264c','\u264d','\u264e','\u264f','\u2650','\u2651','\u2652','\u2653'];
  const cols=['#C9784C','#6B8F71','#6B8FAF','#4C9090','#C9784C','#6B8F71','#6B8FAF','#4C9090','#C9784C','#6B8F71','#6B8FAF','#4C9090'];
  const elems=['Fire','Earth','Air','Water','Fire','Earth','Air','Water','Fire','Earth','Air','Water'];
  const ref=new Date('2026-05-16T03:00:00Z').getTime();
  const i=((Math.floor(((d.getTime()-ref)/86400000/27.321661*12)+1)%12)+12)%12;
  return{name:signs[i],sym:syms[i],col:cols[i],elem:elems[i]};
}

// Daily prompt based on ruling planet + moon phase
function getDailyPrompt(){
  const now=new Date();
  const moon=getMoonPhase(now);
  const dayRuler=CHALDEAN[DAY_IDX[now.getDay()]];
  const planet=P[dayRuler];
  return{prompt:planet.moonPrompts[moon.n]||planet.moonPrompts['New Moon'],moon:moon.n,planet:dayRuler,moonSym:moon.s};
}

// Psalm rotation
function getRotatingPsalm(planet){
  const week=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,1).getTime())/604800000);
  return planet.psalms[week%3];
}

// Planetary hours
function calcState(sr,ss){
  try{
    const now=new Date(),dow=now.getDay(),dIdx=DAY_IDX[dow];
    const srMs=sr.getTime(),ssMs=ss.getTime(),nowMs=now.getTime();
    if(nowMs>=srMs&&nowMs<ssMs){
      isNight=false;
      const hLen=(ssMs-srMs)/12;
      const hNum=Math.min(12,Math.floor((nowMs-srMs)/hLen)+1);
      currentHourNum=hNum;currentPlanet=CHALDEAN[(dIdx+hNum-1)%7];
    }else{
      isNight=true;
      const isBefore=nowMs<srMs;
      const tmrDow=isBefore?dow:(dow+1)%7;
      currentPlanet=CHALDEAN[DAY_IDX[tmrDow]];currentHourNum=1;
    }
  }catch(e){currentPlanet='Sun';currentHourNum=1;isNight=false;}
}

function buildHourList(sr,ss,forTmr){
  try{
    const now=new Date();
    const isBefSr=sunData&&now.getTime()<sunData.sr.getTime();
    const targetDow=forTmr?(isBefSr?now.getDay():(now.getDay()+1)%7):now.getDay();
    const dIdx=DAY_IDX[targetDow];
    const baseSr=forTmr?new Date(sr.getTime()+86400000):sr;
    const baseSs=forTmr?new Date(ss.getTime()+86400000):ss;
    const srMs=baseSr.getTime(),ssMs=baseSs.getTime(),nowMs=now.getTime();
    const hLen=(ssMs-srMs)/12;
    let rows='';
    for(let i=1;i<=12;i++){
      const startMs=srMs+(i-1)*hLen;
      const planet=CHALDEAN[(dIdx+i-1)%7];
      const pp=P[planet];
      const isCur=!isNight&&!forTmr&&i===currentHourNum;
      const isPast=!forTmr&&nowMs>startMs+hLen;
      const isFut=!isPast&&!isCur&&!forTmr;
      const t=new Date(startMs).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      rows+=`<div class="hr-row${isCur?' cur':''}${isPast?' past':''}${isFut?' fut':''}">
        <span class="hr-n">${i}</span>
        <span class="hr-t">${isFut?'--:--':t}</span>
        <span class="hr-s" style="color:${pp.col}">${pp.sym}</span>
        <span class="hr-p" style="color:${isCur?'#C9A84C':isPast?'#6a5e8a':'#c8bfdf'}">${planet}</span>
        ${isCur?'<span class="hr-badge">Now</span>':''}
      </div>`;
    }
    return rows;
  }catch(e){return'';}
}

// Location
function fetchSun(lat,lng,cb){
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=sunrise,sunset&timezone=auto&forecast_days=1`)
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(d=>{if(d.daily&&d.daily.sunrise[0])cb(new Date(d.daily.sunrise[0]),new Date(d.daily.sunset[0]),null);else cb(null,null,'Could not read sun times.');})
    .catch(()=>cb(null,null,'Network error. Please check your connection.'));
}
function useGeo(){
  showLoad('hora-tab','Reading your position...');
  if(!navigator.geolocation){showErr('hora-tab','Location not supported on this device.');return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{fetchSun(pos.coords.latitude,pos.coords.longitude,(sr,ss,err)=>{
      if(err){showErr('hora-tab',err);return;}
      sunData={sr,ss};calcState(sr,ss);lastNotifPlanet=currentPlanet;renderHora();
    });},
    e=>{const m={1:'Location access denied. Please allow in browser settings.',2:'Location unavailable.',3:'Location timed out.'};showErr('hora-tab',m[e.code]||'Location error.');},
    {timeout:12000,maximumAge:600000}
  );
}

      <div style="font-size:10px;letter-spacing:.18em;color:#5a4e7a;text-transform:uppercase;margin-bottom:10px">Ruling Planet of the Day</div>
      <div class="planet-pulse" style="font-size:72px;line-height:1;color:${dp.col};text-shadow:0 0 50px ${dp.col}60;margin-bottom:8px">${dp.sym}</div>
      <div style="font-size:22px;color:#e8e0d0;margin-bottom:4px">${dayRuler}</div>
      <div style="font-size:13px;color:#9d8fbf;font-style:italic;margin-bottom:14px">${dp.energy}</div>
      <div style="background:${dp.col}12;border-radius:11px;padding:12px 14px;text-align:left">
        <div style="font-size:10px;letter-spacing:.12em;color:${dp.col};text-transform:uppercase;margin-bottom:4px">Today's energy is best for</div>
        <div style="font-size:13px;color:#c8bfdf;line-height:1.6">${dp.bestFor}</div>
      </div>
    </div>

    <!-- Today's Daily Tools -->
    <div class="card" style="border-color:${dp.col}30">
      <span class="lbl">Today's Daily Tools</span>
      <div class="row"><span class="row-l">📖 Psalm of the Day</span><span class="row-r" style="color:${dp.col}">${rotPsalm}</span></div>
      <div class="row"><span class="row-l">🕯 Candle</span><span class="row-r">${dp.candle}</span></div>
      <div class="row"><span class="row-l">🌿 Herb</span><span class="row-r">${dp.herb}</span></div>
    </div>

    <!-- Herb of the Day details -->
    <div class="card">
      <span class="lbl">Today's Herb — ${dayRuler} Energy</span>
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div style="font-size:24px;line-height:1;margin-top:2px">🌿</div>
        <div><div style="font-size:16px;color:#e8e0d0;margin-bottom:4px">${herb.n}</div><div style="font-size:13px;color:#9d8fbf;font-style:italic;line-height:1.6">${herb.p}</div></div>
      </div>
    </div>

    <!-- Daily Energy Prompt -->
    <div style="background:linear-gradient(135deg,rgba(${dayRuler==='Saturn'?'80,60,30':'dayRuler'==='Jupiter'?'80,65,10':'35,18,80'},0.3),rgba(15,10,35,0.4));background:linear-gradient(135deg,${dp.col}18,rgba(10,6,26,0.5));border:1px solid ${dp.col}30;border-radius:16px;padding:18px;margin-bottom:12px">
      <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:${dp.col};margin-bottom:4px">Daily Energy Prompt</div>
      <div style="font-size:11px;color:#5a4e7a;margin-bottom:12px">${daily.moonSym} ${daily.moon} · ${dayRuler} Day</div>
      <div style="font-size:14px;color:#c8bfdf;font-style:italic;line-height:1.82">"${daily.prompt}"</div>
      <div style="margin-top:14px">
        <button onclick="switchTab('journal')" style="font-size:11px;padding:6px 14px;background:${dp.col}18;border:1px solid ${dp.col}35;border-radius:20px;color:${dp.col};cursor:pointer;font-family:inherit;touch-action:manipulation">Write your response ✦</button>
      </div>
    </div>

  </div>`;
}

// ── MOON TAB ────────────────────────────────────────────────────
function renderMoon(){
  const tab=document.getElementById('moon-tab');if(!tab)return;
  const now=new Date(),dow=now.getDay();
  const moon=getMoonPhase(now);
  const sign=getMoonSign(now);
  const dayRuler=CHALDEAN[DAY_IDX[dow]];
  const dp=P[dayRuler];

  // Moon-specific guidance
  const moonGuidance={
    'New Moon':{title:'Plant Your Seeds',body:'The new moon is a time of stillness and intention. Write down what you want to call into your life this cycle. Speak it aloud. Pray over it. The energy is receptive right now.',action:'Light a white candle tonight and speak your intentions into the flame.'},
    'Waxing Crescent':{title:'Take the First Step',body:'Growth is beginning. The energy supports new starts, small brave actions and calling in what you planted at the new moon. Do not wait for perfect conditions.',action:'Write one thing you will do today to move toward what you called in.'},
    'First Quarter':{title:'Push Through',body:'You may face resistance right now — that is a sign you are moving in the right direction. The first quarter moon supports decisions, action and breaking through what has been holding you back.',action:'Do the one thing you have been putting off. Do it today.'},
    'Waxing Gibbous':{title:'Refine and Strengthen',body:'You are close to what you have been building. This is the time to adjust, refine and strengthen your intentions. Gratitude is powerful right now — it opens the door wider.',action:'List three things that are already moving in the right direction.'},
    'Full Moon':{title:'Release and Illuminate',body:'The full moon reveals what has been hidden and amplifies everything — including what needs to go. Use this energy to release, cleanse and complete. What you let go of now creates space for what is coming.',action:'Write down what you are releasing and burn or bury the paper tonight.'},
    'Waning Gibbous':{title:'Share and Reflect',body:'The harvest phase. Reflect on what this cycle has brought you and share your gratitude. The energy supports giving back, teaching and deep reflection.',action:'Tell someone something you are grateful for today.'},
    'Last Quarter':{title:'Let Go Deeply',body:'This is the most powerful time for banishing, releasing and cutting what no longer serves. The energy supports hard decisions, final endings and spiritual cleansing work.',action:'Cleanse your space today. Open windows. Burn sage or hyssop.'},
    'Waning Crescent':{title:'Rest and Restore',body:'The final phase before the new cycle. Your energy may be lower than usual — honor that. Rest is sacred. Prepare your spirit for what is coming by emptying out what remains.',action:'Give yourself permission to rest without guilt today.'},
  };
  const guide=moonGuidance[moon.n]||moonGuidance['New Moon'];

  tab.innerHTML=`<div class="fade-in">

    <!-- Moon Phase -->
    <div class="card" style="border-color:${moon.c}55;text-align:center;padding:24px 16px">
      <span class="lbl" style="text-align:center;display:block">Today's Lunar Phase</span>
      <div style="font-size:62px;margin-bottom:10px;line-height:1">${moon.s}</div>
      <div style="font-size:20px;color:#e8e0d0;margin-bottom:4px">${moon.n}</div>
      <div style="font-size:12px;color:${moon.c};margin-bottom:10px">${moon.illum}% illuminated</div>
      <div style="font-size:13px;color:#9d8fbf;font-style:italic;line-height:1.65">${moon.m}</div>
    </div>

    <!-- Moon Sign -->
    <div class="card" style="border-color:${sign.col}45">
      <span class="lbl">Moon Currently in</span>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-size:38px;color:${sign.col};line-height:1">${sign.sym}</div>
        <div>
          <div style="font-size:18px;color:#e8e0d0;margin-bottom:2px">${sign.name}</div>
          <div style="font-size:12px;color:${sign.col};font-style:italic;margin-bottom:4px">${sign.elem} Sign</div>
          <div style="font-size:12px;color:#6a5e8a;line-height:1.5">The moon shifts signs every 2–3 days.<br>Your emotional energy moves with it.</div>
        </div>
      </div>
    </div>

    <!-- Moon Guidance -->
    <div style="background:linear-gradient(135deg,rgba(20,12,50,0.6),rgba(10,5,28,0.6));border:1px solid ${moon.c}40;border-radius:16px;padding:18px;margin-bottom:12px">
      <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:${moon.c};margin-bottom:6px">Moon Guidance</div>
      <div style="font-size:16px;color:#e8e0d0;margin-bottom:8px;font-weight:normal">${guide.title}</div>
      <div style="font-size:13px;color:#c8bfdf;line-height:1.72;margin-bottom:14px">${guide.body}</div>
      <div style="background:${moon.c}12;border-radius:10px;padding:12px;border-left:3px solid ${moon.c}60">
        <div style="font-size:10px;letter-spacing:.12em;color:${moon.c};text-transform:uppercase;margin-bottom:5px">Your action for today</div>
        <div style="font-size:13px;color:#c8bfdf;line-height:1.6">${guide.action}</div>
      </div>
    </div>

    <!-- Today's planet context -->
    <div class="card" style="border-color:${dp.col}30">
      <span class="lbl">Today's Ruling Planet</span>
      <div style="display:flex;align-items:center;gap:12px"><div style="font-size:30px;color:${dp.col};line-height:1">${dp.sym}</div><div><div style="font-size:15px;color:#e8e0d0">${DAYS[dow]} — ${dayRuler}</div><div style="font-size:12px;color:#9d8fbf;font-style:italic;margin-top:2px">${dp.energy}</div></div></div>
    </div>

  </div>`;
}

// ── JOURNAL TAB ─────────────────────────────────────────────────
function renderJournal(){
  const tab=document.getElementById('journal-tab');if(!tab)return;
  const daily=getDailyPrompt();
  const feelOpts=[
    {g:'── HEAVY EMOTIONS ──',f:[]},
    {g:null,f:['Angry','Fearful','Desperate','Despairing','Grief-stricken','Hopeless','Numb','Bitter','Resentful','Heartbroken']},
    {g:'── ANXIOUS EMOTIONS ──',f:[]},
    {g:null,f:['Anxious','Overwhelmed','Scattered','Restless','Unsettled','On edge','Disconnected']},
    {g:'── LOW ENERGY ──',f:[]},
    {g:null,f:['Heavy','Drained','Exhausted','Blocked','Stuck','Lost','Foggy']},
    {g:'── PROCESSING ──',f:[]},
    {g:null,f:['Confused','Searching','Uncertain','Reflective','Conflicted']},
    {g:'── POSITIVE ──',f:[]},
    {g:null,f:['Peaceful','Grateful','Centered','Clear','Hopeful','Energized','Grounded','Joyful']},
  ].map(g=>g.g?`<option disabled style="color:#C9A84C;background:#0f0d24;font-weight:bold">${g.g}</option>`:g.f.map(f=>`<option value="${f}" style="color:#e8e0d0;background:#0f0d24">${f}</option>`).join('')).join('');

  const entries=journalEntries.slice(0,12).map(e=>`
    <div style="background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;gap:8px;flex-wrap:wrap">
        <span style="font-size:11px;color:#C9A84C">${e.planet?e.planet+' Hour':''}</span>
        <span style="font-size:11px;color:#5a4e7a">${e.date}</span>
      </div>
      ${e.feeling?`<div style="margin-bottom:7px"><span style="font-size:11px;padding:2px 9px;border-radius:20px;background:rgba(201,168,76,0.1);color:#C9A84C">${e.feeling}</span></div>`:''}
      <div style="font-size:13px;color:#9d8fbf;font-style:italic;line-height:1.6">${e.text}</div>
    </div>`).join('');

  tab.innerHTML=`<div class="fade-in">

    <!-- Today's Prompt -->
    <div style="background:linear-gradient(135deg,rgba(35,20,80,0.5),rgba(18,10,45,0.5));border:1px solid rgba(138,75,200,0.28);border-radius:16px;padding:18px;margin-bottom:12px">
      <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#9070c8;margin-bottom:4px">Today's Reflection</div>
      <div style="font-size:11px;color:#5a4e7a;margin-bottom:10px">${daily.moonSym} ${daily.moon} · ${daily.planet} Day</div>
      <div style="font-size:15px;color:#c8bfdf;font-style:italic;line-height:1.82;margin-bottom:14px">"${daily.prompt}"</div>
      <div style="font-size:12px;color:#4a3e6a">Take your time. There is no wrong answer.</div>
    </div>

    <!-- Write Area -->
    <div class="card">
      <span class="lbl">Write Here</span>
      <textarea id="j-in" placeholder="Write freely. This space belongs to you..." rows="6"></textarea>
      <div style="margin-top:10px;display:flex;gap:8px;align-items:stretch">
        <div style="position:relative;flex:1.2">
          <select id="feel-sel" style="width:100%;height:100%;min-height:44px;background:#0f0d24;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#7a6e8a;font-family:inherit;font-size:13px;padding:10px 32px 10px 12px;-webkit-appearance:none;appearance:none;">
            <option value="" style="background:#0f0d24">How do you feel?</option>
            ${feelOpts}
          </select>
          <div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#C9A84C;font-size:13px;pointer-events:none">▾</div>
        </div>
        <button class="btn" onclick="saveEntry()" style="flex:1;padding:10px;font-size:12px;white-space:nowrap">Seal Entry</button>
      </div>
    </div>

    <!-- Seeker teaser -->
    <div style="background:rgba(138,75,200,0.05);border:1px solid rgba(138,75,200,0.15);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center">
      <div style="font-size:13px;color:#c8bfdf;font-style:italic;line-height:1.75;margin-bottom:10px">Upgrade to <strong style="color:#b085e8">Seeker</strong> to get prompts that shift with every planetary hour — and track your emotional patterns over time.</div>
      <button onclick="switchTab('hora');setTimeout(()=>document.getElementById('wl-sec').scrollIntoView({behavior:'smooth'}),150)" style="padding:9px 18px;background:rgba(138,75,200,0.1);border:1px solid rgba(138,75,200,0.28);border-radius:20px;color:#8060b8;font-size:12px;cursor:pointer;font-family:inherit;touch-action:manipulation">Join the Waitlist</button>
    </div>

    <!-- Past entries -->
    ${journalEntries.length>0?`<div><span class="lbl">Your Energy Log</span>${entries}</div>`:''}

  </div>`;
}

function saveEntry(){
  try{
    const inp=document.getElementById('j-in');
    const feel=document.getElementById('feel-sel');
    if(!inp||!inp.value.trim())return;
    journalEntries.unshift({text:inp.value.trim(),date:new Date().toLocaleDateString(),planet:currentPlanet||'',feeling:feel?feel.value:''});
    inp.value='';if(feel)feel.value='';
    renderJournal();
  }catch(e){}
}

// Tab switching
function switchTab(name){
  currentTab=name;
  ['hora','ruling','moon','journal'].forEach(t=>{
    const el=document.getElementById(t+'-tab');
    const btn=document.getElementById('btn-'+t);
    if(el)el.style.display=t===name?'block':'none';
    if(btn)btn.classList.toggle('active',t===name);
  });
  if(name==='ruling')renderRuling();
  if(name==='moon')renderMoon();
  if(name==='journal')renderJournal();
}

function renderAll(){renderHora();if(currentTab==='ruling')renderRuling();if(currentTab==='moon')renderMoon();if(currentTab==='journal')renderJournal();}

// Init
renderHora();
</script>
</body>
</html>
