// ── Moon calculations ─────────────────────────────────────────
function getMoonPhase(d){
  try{
    const ref=new Date('2026-05-16T03:00:00Z').getTime();
    const b=((d.getTime()-ref)/86400000%29.530588861)/29.530588861;
    return MOON_PHASES[Math.round((b<0?b+1:b)*8)%8];
  }catch(e){return MOON_PHASES[0];}
}

function getMoonSign(date){
  try{
    const signs=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
    const syms=['\u2648','\u2649','\u264a','\u264b','\u264c','\u264d','\u264e','\u264f','\u2650','\u2651','\u2652','\u2653'];
    const ref=new Date('2026-05-16T03:00:00Z').getTime();
    const daysSince=(date.getTime()-ref)/86400000;
    const i=((Math.floor((daysSince/27.321661*12)+1)%12)+12)%12;
    return{name:signs[i],sym:syms[i]};
  }catch(e){return{name:'Aries',sym:'\u2648'};}
}

function getSignColor(s){
  if(['Aries','Leo','Sagittarius'].includes(s))return'#C9784C';
  if(['Taurus','Virgo','Capricorn'].includes(s))return'#6B8F71';
  if(['Gemini','Libra','Aquarius'].includes(s))return'#6B8FAF';
  return'#4C8F8F';
}
function getSignElement(s){
  if(['Aries','Leo','Sagittarius'].includes(s))return'Fire';
  if(['Taurus','Virgo','Capricorn'].includes(s))return'Earth';
  if(['Gemini','Libra','Aquarius'].includes(s))return'Air';
  return'Water';
}

// ── Planetary hour calculation ────────────────────────────────
function calcPlanet(sunrise,sunset){
  try{
    const now=new Date(),dow=now.getDay(),dIdx=DAY_IDX[dow];
    const srMs=sunrise.getTime(),ssMs=sunset.getTime(),nowMs=now.getTime();
    if(nowMs>=srMs&&nowMs<ssMs){
      // Daytime — show current planetary hour
      isDay=true;
      const hLen=(ssMs-srMs)/12;
      const hourNum=Math.min(12,Math.floor((nowMs-srMs)/hLen)+1);
      currentHourNum=hourNum;
      currentPlanet=CHALDEAN[(dIdx+hourNum-1)%7];
    }else{
      // Nighttime — free tier shows tomorrow's first daytime hour (Hour 1)
      isDay=false;
      // Get tomorrow's day ruler
      const tomorrow=new Date(now);
      tomorrow.setDate(tomorrow.getDate()+1);
      const tDow=tomorrow.getDay();
      const tDIdx=DAY_IDX[tDow];
      currentHourNum=1;
      currentPlanet=CHALDEAN[tDIdx]; // First hour of tomorrow
    }
  }catch(e){currentPlanet='Sun';currentHourNum=1;isDay=true;}
}

function build12Hours(sunrise,sunset){
  try{
    const now=new Date();
    // If nighttime use tomorrow's data
    const useDate=isDay?now:new Date(now.getTime()+86400000);
    const dow=useDate.getDay(),dIdx=DAY_IDX[dow];
    // If night use tomorrow's sunrise/sunset (approximate +24h)
    const sr=isDay?sunrise:new Date(sunrise.getTime()+86400000);
    const ss=isDay?sunset:new Date(sunset.getTime()+86400000);
    const srMs=sr.getTime(),ssMs=ss.getTime(),nowMs=now.getTime();
    const hLen=(ssMs-srMs)/12;
    let rows='';
    for(let i=1;i<=12;i++){
      const startMs=srMs+(i-1)*hLen;
      const planet=CHALDEAN[(dIdx+i-1)%7];
      const pp=P[planet];
      const isCurrent=isDay&&i===currentHourNum;
      const isPast=isDay&&nowMs>startMs+hLen&&!isCurrent;
      const isFuture=!isPast&&!isCurrent;
      if(isFuture){
        rows+=`<div class="hour-row" style="opacity:0.45">
          <span class="hour-num">${i}</span>
          <span class="hour-time" style="color:#5a4e7a">--:--</span>
          <span class="hour-sym" style="color:${pp.col}55">${pp.sym}</span>
          <span class="hour-planet" style="color:#4a3e6a">${planet}</span>
          <span class="lock-badge">🔒 Seeker</span>
        </div>`;
      }else{
        rows+=`<div class="hour-row${isCurrent?' current':''}${isPast?' past':''}">
          <span class="hour-num">${i}</span>
          <span class="hour-time">${new Date(startMs).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
          <span class="hour-sym" style="color:${pp.col}">${pp.sym}</span>
          <span class="hour-planet" style="color:${isCurrent?'#C9A84C':'#c8bfdf'}">${planet}</span>
          ${isCurrent?'<span class="hour-badge">Now</span>':''}
        </div>`;
      }
    }
    rows+=`<div style="margin-top:8px;padding:14px;background:rgba(138,75,200,0.06);border:1px solid rgba(138,75,200,0.2);border-radius:10px;text-align:center">
      <div style="font-size:13px;color:#b085e8;margin-bottom:4px">☾ 12 Night Hours Hidden</div>
      <div style="font-size:12px;color:#7a6e8a;margin-bottom:10px">Upgrade to Seeker to reveal all 24 planetary ruling hours</div>
      <button onclick="alert('Seeker tier coming soon. Follow Mother Louisa for the launch announcement.')" style="padding:8px 18px;background:linear-gradient(135deg,#3d1f8e,#2a1060);border:1px solid rgba(138,75,200,0.4);border-radius:20px;color:#b085e8;font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:.06em">Unlock Seeker — $4.99 / month</button>
    </div>`;
    return rows;
  }catch(e){return'<div style="color:#7a6e8a;font-size:13px;padding:10px">Unable to calculate hours. Please refresh.</div>';}
}

function fmtTime(d){try{return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch(e){return'--:--';}}

// ── Clock ─────────────────────────────────────────────────────
function updateClock(){

    // Auto-refresh planet every minute
    if(sunData)calcPlanet(sunData.sunrise,sunData.sunset);
  }catch(e){}
}

// ── Location ──────────────────────────────────────────────────
function useGeolocation(){
  showLoading('hora-tab','Reading your position...');
  if(!navigator.geolocation){
    showError('hora-tab','Location not supported on this device. Please try a different browser.');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude, lng=pos.coords.longitude;
      // Use open-meteo which has no CORS restrictions
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=sunrise,sunset&timezone=auto&forecast_days=1`)
        .then(r=>{if(!r.ok)throw new Error('API error');return r.json();})
        .then(d=>{
          if(d.daily&&d.daily.sunrise&&d.daily.sunset){
            const sr=new Date(d.daily.sunrise[0]);
            const ss=new Date(d.daily.sunset[0]);
            sunData={sunrise:sr,sunset:ss};
            calcPlanet(sr,ss);
          }else{throw new Error('Bad data');}
          renderHora();
        })
        .catch(()=>{
          // Fallback: calculate approximate times from coordinates
          calcApproxSunTimes(lat,lng);
        });
    },
    err=>{
      let msg='Location access was denied.';
      if(err.code===1)msg='Location access denied. Please allow location in your browser settings.';
      if(err.code===2)msg='Location unavailable. Please check your connection.';
      if(err.code===3)msg='Location request timed out. Please try again.';
      showError('hora-tab',msg);
    },
    {timeout:10000,maximumAge:300000}
  );
}

function calcApproxSunTimes(lat, lng){
  try{
    const now=new Date();
    const dayOfYear=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
    const declDeg=23.45*Math.sin((2*Math.PI/365)*(dayOfYear-81));
    const declRad=declDeg*Math.PI/180;
    const latRad=lat*Math.PI/180;
    const cosHA=-Math.tan(latRad)*Math.tan(declRad);
    const HA=Math.acos(Math.max(-1,Math.min(1,cosHA)))*180/Math.PI;
    // Longitude correction: each degree = 4 minutes
    const lngOffset=lng/15;
    const srDecimal=12-(HA/15)+lngOffset;
    const ssDecimal=12+(HA/15)+lngOffset;
    const sr=new Date(now);
    const srH=((srDecimal%24)+24)%24;
    const ssH=((ssDecimal%24)+24)%24;
    sr.setHours(Math.floor(srH),Math.round((srH%1)*60),0,0);
    const ss=new Date(now);
    ss.setHours(Math.floor(ssH),Math.round((ssH%1)*60),0,0);
    sunData={sunrise:sr,sunset:ss};
    calcPlanet(sr,ss);
    renderHora();
  }catch(e){
    showError('hora-tab','Could not calculate sun times. Please check your connection and try again.');
  }
}
