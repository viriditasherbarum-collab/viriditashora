function getMoonPhase(d){
  const ref=new Date('2026-05-16T03:00:00Z').getTime();
  const daysSince=(d.getTime()-ref)/86400000;
  let b=(daysSince%29.530588861)/29.530588861;
  if(b<0)b+=1;
  return MOON_PHASES[Math.round(b*8)%8];
}

function getMoonSign(date){
  const signs=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  const syms=['\u2648','\u2649','\u264a','\u264b','\u264c','\u264d','\u264e','\u264f','\u2650','\u2651','\u2652','\u2653'];
  const ref=new Date('2026-05-16T03:00:00Z').getTime();
  const daysSince=(date.getTime()-ref)/86400000;
  const idx=Math.floor(((daysSince/27.321661*12)+1))%12;
  const i=((idx%12)+12)%12;
  return{name:signs[i],sym:syms[i]};
}

const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
let sunData=null,currentPlanet=null,currentHourNum=1,isDay=true,journalEntries=[];

function calcPlanet(sunrise,sunset){
  const now=new Date(),dow=now.getDay(),dIdx=DAY_IDX[dow];
  const srMs=sunrise.getTime(),ssMs=sunset.getTime(),nowMs=now.getTime();
  let hourNum,pIdx;
  if(nowMs>=srMs&&nowMs<ssMs){
    isDay=true;
    const hLen=(ssMs-srMs)/12;
    hourNum=Math.min(12,Math.floor((nowMs-srMs)/hLen)+1);
    pIdx=(dIdx+hourNum-1)%7;
  }else{
    isDay=false;
    let nightStart,nIdx;
    if(nowMs<srMs){const yd=new Date(now);yd.setDate(yd.getDate()-1);nIdx=DAY_IDX[yd.getDay()];const ys=new Date(sunset);ys.setDate(ys.getDate()-1);nightStart=ys.getTime();}
    else{nIdx=dIdx;nightStart=ssMs;}
    const nextSr=new Date(sunrise);nextSr.setDate(nextSr.getDate()+1);
    const nhLen=(nextSr.getTime()-nightStart)/12;
    hourNum=Math.min(12,Math.floor((nowMs-nightStart)/nhLen)+1);
    pIdx=(nIdx+12+hourNum-1)%7;
  }
  currentHourNum=hourNum;currentPlanet=CHALDEAN[pIdx];
}

function build12Hours(sunrise,sunset){
  const now=new Date(),dow=now.getDay(),dIdx=DAY_IDX[dow];
  const srMs=sunrise.getTime(),ssMs=sunset.getTime(),nowMs=now.getTime();
  const hLen=(ssMs-srMs)/12;
  let rows='';
  for(let i=1;i<=12;i++){
    const startMs=srMs+(i-1)*hLen;
    const planet=CHALDEAN[(dIdx+i-1)%7];
    const pp=P[planet];
    const isCurrent=isDay&&i===currentHourNum;
    const isPast=nowMs>startMs+hLen&&!isCurrent;
    rows+=`<div class="hour-row${isCurrent?' current':''}${isPast?' past':''}">
      <span class="hour-num">${i}</span>
      <span class="hour-time">${new Date(startMs).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
      <span class="hour-sym" style="color:${pp.col}">${pp.sym}</span>
      <span class="hour-planet" style="color:${isCurrent?'#C9A84C':'#c8bfdf'}">${planet}</span>
      ${isCurrent?'<span class="hour-badge">Now</span>':''}
    </div>`;
  }
  return rows;
}

}

  document.getElementById('moon-tab').innerHTML=`<div class="fade-in">

    <div class="card" style="border-color:${moon.col}60;text-align:center;padding:26px 20px">
      <span class="lbl" style="text-align:center;display:block">Today's Lunar Phase</span>

function renderJournal(){
  const dow=new Date().getDay();
  const prompt=SHADOW_PROMPTS[dow%SHADOW_PROMPTS.length];
  const feelingOptions=FEELING_GROUPS.map(g=>{
    if(g.group)return`<option disabled style="color:#C9A84C;background:#1a1035;font-weight:bold">${g.group}</option>`;
    return g.feelings.map(f=>`<option value="${f}" style="color:#e8e0d0;background:#1a1035">${f}</option>`).join('');
  }).join('');
  const entries=journalEntries.map(e=>`
    <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:#C9A84C">${e.planet} Hour</span>
        <span style="font-size:11px;color:#7a6e8a">${e.date}</span>
      </div>
      ${e.feeling?`<div style="margin-bottom:6px"><span style="font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(201,168,76,0.1);color:#C9A84C">${e.feeling}</span></div>`:''}
      <div style="font-size:13px;color:#9d8fbf;font-style:italic;line-height:1.55">${e.text}</div>
    </div>`).join('');

  document.getElementById('journal-tab').innerHTML=`<div class="fade-in">

    <div class="card">
      <span class="lbl">How are you feeling right now?</span>
      <div style="font-size:12px;color:#c8bfdf;margin-bottom:12px;line-height:1.6">Select what resonates most with your energy right now. You may know it when you see it.</div>
      <div class="dd-wrap">

          <option value="" style="color:#e8e0d0;background:#1a1035">Select how you feel...</option>
          ${feelingOptions}
        </select>
        <div class="dd-arrow">▾</div>
      </div>
      <div style="font-size:11px;color:#7a6e8a;font-style:italic;line-height:1.7">Being aware of your energy is the first step to understanding it, healing it, protecting it, controlling it and ultimately utilizing it for your highest good.</div>

    <div style="margin-bottom:14px">

    </div>

    <div style="background:rgba(138,75,200,0.06);border:1px solid rgba(138,75,200,0.2);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center">
      <div style="font-size:13px;color:#c8bfdf;font-style:italic;line-height:1.7;margin-bottom:10px">
        You have logged how you feel.<br>
        Upgrade to <strong style="color:#b085e8">Seeker</strong> to discover why — and watch the pattern reveal itself over time.

      <button onclick="alert('Seeker tier coming soon!')" style="padding:10px 20px;background:linear-gradient(135deg,#3d1f8e,#2a1060);border:1px solid rgba(138,75,200,0.4);border-radius:20px;color:#b085e8;font-size:12px;letter-spacing:.08em;cursor:pointer;font-family:inherit">Unlock Seeker — $4.99 / month</button>

    ${journalEntries.length>0?`<div><div style="font-size:10px;letter-spacing:.2em;color:#7a6e8a;text-transform:uppercase;margin-bottom:10px">Your Energy Log</div>${entries}</div>`:''}

function saveEntry(){
  const input=document.getElementById('journal-input');
  const feelSel=document.getElementById('feeling-select');
  if(!input||!input.value.trim())return;
  journalEntries.unshift({text:input.value.trim(),date:new Date().toLocaleDateString(),planet:currentPlanet||'Unknown',feeling:feelSel?feelSel.value:''});
  renderJournal();
}

function switchTab(name){
  ['hora','moon','journal'].forEach(t=>{
    document.getElementById(t+'-tab').style.display=t===name?'block':'none';
    document.getElementById('btn-'+t).classList.toggle('active',t===name);
  });
  if(name==='moon')renderMoon();
  if(name==='journal')renderJournal();
}
