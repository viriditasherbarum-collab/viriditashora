// ─── PLANETARY HOUR CALCULATION ─────────────────────────────────
function getPlanetaryHours(srH, ssH){
  var now = new Date();
  var dayOfWeek = now.getDay(); // 0=Sun
  var dayRuler = DAY_RULERS[dayOfWeek];
  var dayRulerIdx = CHALDEAN.indexOf(dayRuler);
  var hours = [];
  var dayLen = (ssH - srH) * 3600;
  var nightLen = (24 - (ssH - srH)) * 3600;
  var dayHourLen = dayLen / 12;
  var nightHourLen = nightLen / 12;
  var baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), srH, 0, 0);
  for(var i=0;i<12;i++){
    var start = new Date(baseDate.getTime() + i * dayHourLen * 1000);
    var end = new Date(baseDate.getTime() + (i+1) * dayHourLen * 1000);
    var pIdx = (dayRulerIdx + i) % 7;
    var planet = CHALDEAN[pIdx];
    hours.push({num:i+1, planet:planet, start:start, end:end, isDay:true});
  }
  var nightBase = new Date(baseDate.getTime() + dayLen * 1000);
  var nightDayRulerIdx = (dayRulerIdx + 12) % 7;
  for(var j=0;j<12;j++){
    var ns = new Date(nightBase.getTime() + j * nightHourLen * 1000);
    var ne = new Date(nightBase.getTime() + (j+1) * nightHourLen * 1000);
    var npIdx = (nightDayRulerIdx + j) % 7;
    var np = CHALDEAN[npIdx];
    hours.push({num:j+13, planet:np, start:ns, end:ne, isDay:false});
  }
  return hours;
}

function getCurrentHourObj(hours){
  var now = new Date();
  for(var i=0;i<hours.length;i++){
    if(now >= hours[i].start && now < hours[i].end) return hours[i];
  }
  return hours[0];
}

function fmt(d){
  var h=d.getHours(),m=d.getMinutes(),ampm=h>=12?'PM':'AM';
  h=h%12||12;
  return h+':'+(m<10?'0'+m:m)+' '+ampm;
}

// ─── NOTIFICATION ───────────────────────────────────────────────
function checkHourChange(hours){
  var cur = getCurrentHourObj(hours);
  if(cur && cur.num !== lastHourIndex){
    if(lastHourIndex !== -1){
      var p = PLANETS[cur.planet];
      var nb = document.getElementById('notif-banner');
      var nt = document.getElementById('notif-text');
      nt.textContent = p.name + ' Hour begins — ' + p.energy;
      nb.style.display = 'block';
      clearTimeout(notifTimeout);
      notifTimeout = setTimeout(function(){ nb.style.display='none'; }, 8000);
    }
    lastHourIndex = cur.num;
  }
}

// ─── MOON CALCULATION ───────────────────────────────────────────
function getMoonData(){
  var now = new Date();
  var known = new Date('2000-01-06T18:14:00Z');
  var cycle = 29.530588853;
  var diff = (now - known) / (1000*60*60*24);
  var age = ((diff % cycle) + cycle) % cycle;
  var illum = Math.round(50 * (1 - Math.cos(2 * Math.PI * age / cycle)));
  var phase = Math.floor(age / (cycle/8));
  // Moon sign (approximate)
  var moonSignIdx = Math.floor((age / cycle) * 12) % 12;
  return {
    phase: MOON_PHASES[phase] || MOON_PHASES[0],
    illumination: illum,
    sign: MOON_SIGNS[moonSignIdx],
    age: age.toFixed(1)
  };
}

  html += '<div class="journal-prompt-text">'+prompt+'</div>';

  html += '<textarea class="journal-textarea" id="journal-input" placeholder="Write freely here... there is no wrong answer."></textarea>';
  html += '<button class="journal-save-btn" onclick="saveJournalEntry()">✦ Save Entry</button>';

  if(entries.length > 0){
    html += '<div class="journal-entries" style="margin-top:20px;">';
    html += '<span class="lbl">Past Entries</span>';
    for(var i=entries.length-1;i>=Math.max(0,entries.length-5);i--){
      var e = entries[i];
      html += '<div class="journal-entry"><div class="journal-entry-date">'+e.date+'</div>';
      html += '<div class="journal-entry-text">'+e.text+'</div></div>';
    }
    html += '</div>';
  }
  document.getElementById('journal-content').innerHTML = html;
}

function saveJournalEntry(){
  var txt = document.getElementById('journal-input');
  if(!txt || !txt.value.trim()) return;
  var entries = [];
  try{ entries = JSON.parse(localStorage.getItem('vh_journal')||'[]'); }catch(e){}
  var d = new Date();
  entries.push({
    date: d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
    text: txt.value.trim()
  });
  localStorage.setItem('vh_journal', JSON.stringify(entries));
  txt.value = '';
  renderJournal();
}

// ─── TAB SWITCHING ──────────────────────────────────────────────
function switchTab(name, btn){
  currentTab = name;
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='hora') renderHora();
  if(name==='ruling') renderRuling();
  if(name==='moon') renderMoon();
  if(name==='journal') renderJournal();
}

function renderAll(){
  renderHora();
  if(currentTab==='ruling') renderRuling();
  if(currentTab==='moon') renderMoon();
  if(currentTab==='journal') renderJournal();
}

// ─── LOCATION + SUNRISE/SUNSET ──────────────────────────────────
function loadSunTimes(){
  if(!navigator.geolocation){ renderAll(); return; }
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude.toFixed(4);
    var lon = pos.coords.longitude.toFixed(4);
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&daily=sunrise,sunset&timezone=auto&forecast_days=1')
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.daily && data.daily.sunrise && data.daily.sunrise[0]){
          var sr = new Date(data.daily.sunrise[0]);
          var ss = new Date(data.daily.sunset[0]);
          sunriseHour = sr.getHours() + sr.getMinutes()/60;
          sunsetHour = ss.getHours() + ss.getMinutes()/60;
        }
        // Reverse geocode city
        fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json')
          .then(function(r){return r.json();})
          .then(function(geo){
            locationName = (geo.address && (geo.address.city || geo.address.town || geo.address.county)) || '';
            renderAll();
          }).catch(function(){renderAll();});
      }).catch(function(){renderAll();});
  }, function(){ renderAll(); });
}
