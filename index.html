// ── Moon ───────────────────────────────────────────────────────
function getMoonPhase(d){
  const ref=new Date('2026-05-16T03:00:00Z').getTime();
  let b=((d.getTime()-ref)/86400000%29.530588861)/29.530588861;
  if(b<0)b+=1;
  const idx=Math.round(b*8)%8;
  const illum=Math.round((1-Math.cos(b*2*Math.PI))/2*100);
  return{...MOON_PHASES[idx],illum};
}
function getMoonSign(d){
  const signs=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  const syms=['\u2648','\u2649','\u264a','\u264b','\u264c','\u264d','\u264e','\u264f','\u2650','\u2651','\u2652','\u2653'];
  const ref=new Date('2026-05-16T03:00:00Z').getTime();
  const i=((Math.floor(((d.getTime()-ref)/86400000/27.321661*12)+1)%12)+12)%12;
  const cols=['#C9784C','#6B8F71','#6B8FAF','#4C9090','#C9784C','#6B8F71','#6B8FAF','#4C9090','#C9784C','#6B8F71','#6B8FAF','#4C9090'];
  const elems=['Fire','Earth','Air','Water','Fire','Earth','Air','Water','Fire','Earth','Air','Water'];
  return{name:signs[i],sym:syms[i],col:cols[i],elem:elems[i]};
}

// ── Psalm rotation ─────────────────────────────────────────────
function getRotatingPsalm(planet){
  const week=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,1).getTime())/604800000);
  return planet.psalms[week%3];
}

// ── Planetary hours ────────────────────────────────────────────
function calcState(sr,ss){
  try{
    const now=new Date(),dow=now.getDay(),dIdx=DAY_IDX[dow];
    const srMs=sr.getTime(),ssMs=ss.getTime(),nowMs=now.getTime();
    if(nowMs>=srMs&&nowMs<ssMs){
      isNight=false;
      const hLen=(ssMs-srMs)/12;
      const hNum=Math.min(12,Math.floor((nowMs-srMs)/hLen)+1);
      currentHourNum=hNum;
      currentPlanet=CHALDEAN[(dIdx+hNum-1)%7];
    }else{
      isNight=true;
      currentPlanet=CHALDEAN[DAY_IDX[(now.getDay()+1)%7]];
      currentHourNum=1;
    }
  }catch(e){currentPlanet='Sun';currentHourNum=1;isNight=false;}
}

function buildDayHours(sr,ss,forTmr){
  try{
    const now=new Date();
    const targetDow=forTmr?(now.getDay()+1)%7:now.getDay();
    const dIdx=DAY_IDX[targetDow];
    const baseSr=forTmr?new Date(sr.getTime()+86400000):sr;
    const baseSs=forTmr?new Date(ss.getTime()+86400000):ss;
    const srMs=baseSr.getTime(),ssMs=baseSs.getTime(),nowMs=now.getTime();
    const hLen=(ssMs-srMs)/12;
    let rows='';
    for(let i=1;i<=12;i++){
      const startMs=srMs+(i-1)*hLen;
      const planet=CHALDEAN[(dIdx+i-1)%7];
      const pp=P[planet];
      const isCur=!isNight&&!forTmr&&i===currentHourNum;
      const isPast=!forTmr&&nowMs>startMs+hLen;
      const isFut=!isPast&&!isCur&&!forTmr;
      const t=new Date(startMs).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      if(isFut){

// ── Sun times ──────────────────────────────────────────────────
function fetchSun(lat,lng,cb){
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=sunrise,sunset&timezone=auto&forecast_days=1`)
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(d=>{
      if(d.daily&&d.daily.sunrise[0]){cb(new Date(d.daily.sunrise[0]),new Date(d.daily.sunset[0]),null);}
      else cb(null,null,'Could not read sun times.');
    }).catch(()=>cb(null,null,'Network error. Please check your connection.'));
}

function useGeo(){
  showLoad('hora-tab','Reading your position...');
  if(!navigator.geolocation){showErr('hora-tab','Location not supported on this device.');return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      fetchSun(pos.coords.latitude,pos.coords.longitude,(sr,ss,err)=>{
        if(err){showErr('hora-tab',err);return;}
        sunData={sr,ss};calcState(sr,ss);checkNotif();renderHora();
      });
    },
    e=>{
      const m={1:'Location access denied. Please allow location in your browser settings.',2:'Location unavailable.',3:'Location timed out.'};
      showErr('hora-tab',m[e.code]||'Location error.');
    },
    {timeout:12000,maximumAge:600000}
  );
}
function resetLoc(){sunData=null;currentPlanet=null;renderHora();}
function refreshNow(){if(!sunData){renderHora();return;}showLoad('hora-tab','Refreshing...');setTimeout(()=>{calcState(sunData.sr,sunData.ss);renderHora();},300);}
function showLoad(id,msg){const el=document.getElementById(id);if(el)el.innerHTML=`<div style="text-align:center;padding:50px 0"><div class="float" style="font-size:42px;color:#C9A84C;margin-bottom:14px">✦</div><div style="font-size:13px;color:#c8bfdf">${msg}</div></div>`;}
function showErr(id,msg){const el=document.getElementById(id);if(el)el.innerHTML=`<div style="background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.25);border-radius:14px;padding:16px;margin-bottom:12px;font-size:14px;color:#e8a090;line-height:1.65">${msg}</div><button class="btn" onclick="renderHora()">Try Again</button>`;}

    <div class="card" style="border-color:${dp.col}38">
      <span class="lbl">Today's Herb — ${dr} Energy</span>
      <div style="display:flex;align-items:flex-start;gap:12px"><div style="font-size:24px;line-height:1;margin-top:2px">🌿</div><div><div style="font-size:16px;color:#e8e0d0;margin-bottom:4px">${herb.n}</div><div style="font-size:13px;color:#9d8fbf;font-style:italic;line-height:1.6">${herb.p}</div></div></div>
    </div>
    <div class="card" style="border-color:${dp.col}38">
      <span class="lbl">Today's Ruling Energy</span>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><div style="font-size:32px;color:${dp.col};line-height:1">${dp.sym}</div><div><div style="font-size:15px;color:#e8e0d0">${DAYS[dow]} — ${dr}</div><div style="font-size:12px;color:#9d8fbf;font-style:italic;margin-top:2px">${dp.energy}</div></div></div>
      <div style="font-size:13px;color:#c8bfdf;line-height:1.6">${dp.bestFor}</div>
    </div>
  </div>`;
}

// ── Journal Tab ────────────────────────────────────────────────
function getPrompt(idx){return SHADOW_PROMPTS[((idx%SHADOW_PROMPTS.length)+SHADOW_PROMPTS.length)%SHADOW_PROMPTS.length];}

function renderJournal(){
  const tab=document.getElementById('journal-tab');if(!tab)return;
  const prompt=getPrompt(promptIdx);
  const feelOpts=FEELINGS_GROUPS.map(g=>{
    if(g.g)return`<option disabled style="color:#C9A84C;background:#0f0d24;font-weight:bold">${g.g}</option>`;
    return g.f.map(f=>`<option value="${f}" style="color:#e8e0d0;background:#0f0d24">${f}</option>`).join('');
  }).join('');
  const entries=journalEntries.slice(0,15).map(e=>`
    <div style="background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;gap:8px;flex-wrap:wrap"><span style="font-size:11px;color:#C9A84C">${e.planet||''} Hour</span><span style="font-size:11px;color:#5a4e7a">${e.date}</span></div>
      ${e.feeling?`<div style="margin-bottom:7px"><span style="font-size:11px;padding:2px 9px;border-radius:20px;background:rgba(201,168,76,0.1);color:#C9A84C">${e.feeling}</span></div>`:''}
      <div style="font-size:13px;color:#9d8fbf;font-style:italic;line-height:1.6">${e.text}</div>
    </div>`).join('');

  tab.innerHTML=`<div class="fade-in">
    <div style="background:linear-gradient(135deg,rgba(40,25,90,0.5),rgba(20,12,50,0.5));border:1px solid rgba(138,75,200,0.3);border-radius:16px;padding:18px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span class="lbl" style="margin-bottom:0">Today's Reflection</span>
        <button onclick="nextPrompt()" style="font-size:11px;color:#9d8fbf;background:rgba(138,75,200,0.12);border:1px solid rgba(138,75,200,0.2);border-radius:20px;padding:4px 11px;cursor:pointer;font-family:inherit;touch-action:manipulation;white-space:nowrap">New ✦</button>
      </div>
      <div id="prompt-text" style="font-size:14px;color:#c8bfdf;font-style:italic;line-height:1.8;transition:opacity 0.3s">"${prompt}"</div>
    </div>
    <div class="card">
      <span class="lbl">Write Your Response</span>
      <textarea id="j-input" placeholder="Write freely here. This space is yours..." rows="5"></textarea>
      <div style="margin-top:10px;display:flex;gap:8px">
        <div style="position:relative;flex:1">
          <select id="feel-sel" style="width:100%;background:#0f0d24;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#9d8fbf;font-family:inherit;font-size:13px;padding:11px 36px 11px 12px;-webkit-appearance:none;appearance:none;">
            <option value="" style="background:#0f0d24">How do you feel?</option>
            ${feelOpts}
          </select>
          <div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#C9A84C;font-size:13px;pointer-events:none">▾</div>
        </div>
        <button class="btn" onclick="saveEntry()" style="flex:1;padding:11px;font-size:12px">Seal Entry</button>
      </div>
    </div>
    <div style="background:rgba(138,75,200,0.05);border:1px solid rgba(138,75,200,0.18);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center">
      <div style="font-size:13px;color:#c8bfdf;font-style:italic;line-height:1.75;margin-bottom:10px">You have logged how you feel.<br>Upgrade to <strong style="color:#b085e8">Seeker</strong> to discover why — and watch the pattern reveal itself over time.</div>
      <button onclick="switchTab('hora');setTimeout(()=>document.getElementById('waitlist').scrollIntoView({behavior:'smooth'}),100)" style="padding:10px 20px;background:rgba(138,75,200,0.15);border:1px solid rgba(138,75,200,0.35);border-radius:20px;color:#b085e8;font-size:12px;cursor:pointer;font-family:inherit;touch-action:manipulation">Join the Waitlist</button>
    </div>
    ${journalEntries.length>0?`<div><span class="lbl">Your Energy Log</span>${entries}</div>`:''}
  </div>`;
}

function nextPrompt(){
  promptIdx=(promptIdx+1)%SHADOW_PROMPTS.length;
  const el=document.getElementById('prompt-text');
  if(el){el.style.opacity='0';setTimeout(()=>{el.textContent='"'+getPrompt(promptIdx)+'"';el.style.opacity='1';},250);}
}

function saveEntry(){
  try{
    const inp=document.getElementById('j-input');
    const feel=document.getElementById('feel-sel');
    if(!inp||!inp.value.trim())return;
    journalEntries.unshift({text:inp.value.trim(),date:new Date().toLocaleDateString(),planet:currentPlanet||'',feeling:feel?feel.value:''});
    inp.value='';if(feel)feel.value='';
    renderJournal();
  }catch(e){}
}

// ── Tab switching ──────────────────────────────────────────────
function switchTab(name){
  currentTab=name;
  ['hora','moon','journal'].forEach(t=>{
    const el=document.getElementById(t+'-tab');
    const btn=document.getElementById('btn-'+t);
    if(el)el.style.display=t===name?'block':'none';
    if(btn)btn.classList.toggle('active',t===name);
  });
  if(name==='moon')renderMoon();
  if(name==='journal')renderJournal();
}

// ── Init ───────────────────────────────────────────────────────
renderHora();
</script>
</body>
</html>
