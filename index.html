// ── Moon ───────────────────────────────────────────────────────
function getMoonPhase(d){
  const ref=new Date('2026-05-16T03:00:00Z').getTime();
  let b=((d.getTime()-ref)/86400000%29.530588861)/29.530588861;
  if(b<0)b+=1;
  const idx=Math.round(b*8)%8;
  const illum=Math.round(Math.abs(Math.cos(b*2*Math.PI))*100);
  return{...MOON_PHASES[idx],illum};
}
function getMoonSign(d){
  const signs=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  const syms=['\u2648','\u2649','\u264a','\u264b','\u264c','\u264d','\u264e','\u264f','\u2650','\u2651','\u2652','\u2653'];
  const ref=new Date('2026-05-16T03:00:00Z').getTime();
  const days=(d.getTime()-ref)/86400000;
  const i=((Math.floor((days/27.321661*12)+1)%12)+12)%12;
  return{name:signs[i],sym:syms[i],col:signCol(signs[i]),elem:signElem(signs[i])};
}
function signCol(s){
  if(['Aries','Leo','Sagittarius'].includes(s))return'#C9784C';
  if(['Taurus','Virgo','Capricorn'].includes(s))return'#6B8F71';
  if(['Gemini','Libra','Aquarius'].includes(s))return'#6B8FAF';
  return'#4C9090';
}
function signElem(s){
  if(['Aries','Leo','Sagittarius'].includes(s))return'Fire';
  if(['Taurus','Virgo','Capricorn'].includes(s))return'Earth';
  if(['Gemini','Libra','Aquarius'].includes(s))return'Air';
  return'Water';
}

// ── Planetary hours ────────────────────────────────────────────
function calcState(sr,ss){
  const now=new Date(),dow=now.getDay(),dIdx=DAY_IDX[dow];
  const srMs=sr.getTime(),ssMs=ss.getTime(),nowMs=now.getTime();

  if(nowMs>=srMs&&nowMs<ssMs){
    // Daytime
    isNight=false;
    const hLen=(ssMs-srMs)/12;
    const hNum=Math.min(12,Math.floor((nowMs-srMs)/hLen)+1);
    currentHourNum=hNum;
    currentPlanet=CHALDEAN[(dIdx+hNum-1)%7];
  } else {
    isNight=true;
    // For free tier: show first planetary hour of next day
    const tmrDow=(dow+1)%7;
    const tmrIdx=DAY_IDX[tmrDow];
    currentPlanet=CHALDEAN[tmrIdx]; // first hour of next day = day ruler
    currentHourNum=1;
  }
}

function buildHourList(sr,ss,forTomorrow){
  const now=new Date();
  const targetDow=forTomorrow?(now.getDay()+1)%7:now.getDay();
  const dIdx=DAY_IDX[targetDow];
  const srMs=(forTomorrow?new Date(sr.getTime()+86400000):sr).getTime();
  const ssMs=(forTomorrow?new Date(ss.getTime()+86400000):ss).getTime();
  const hLen=(ssMs-srMs)/12;
  const nowMs=now.getTime();
  let rows='';

  for(let i=1;i<=12;i++){
    const startMs=srMs+(i-1)*hLen;
    const planet=CHALDEAN[(dIdx+i-1)%7];
    const pp=P[planet];
    const isCur=!isNight&&!forTomorrow&&i===currentHourNum;
    const isPast=!forTomorrow&&nowMs>startMs+hLen;
    const isFut=!isPast&&!isCur;

    if(isFut&&!forTomorrow){
      rows+=`<div class="hr-row"><span class="hr-n">${i}</span><span class="hr-t" style="color:#3a3060">--:--</span><span class="hr-s" style="color:${pp.col}55">${pp.sym}</span><span class="hr-p" style="color:#3a3060">${planet}</span><span class="lock-b">🔒 Seeker</span></div>`;
    } else {
      const timeStr=new Date(startMs).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      rows+=`<div class="hr-row${isCur?' cur':''}${isPast?' past':''}">
        <span class="hr-n">${i}</span>
        <span class="hr-t">${timeStr}</span>
        <span class="hr-s" style="color:${pp.col}">${pp.sym}</span>
        <span class="hr-p" style="color:${isCur?'#C9A84C':'#c8bfdf'}">${planet}</span>
        ${isCur?'<span class="hr-badge">Now</span>':''}
      </div>`;
    }
  }
  return rows;
}

function buildNightHours(sr,ss){
  const now=new Date(),dow=now.getDay(),dIdx=DAY_IDX[dow];
  const srMs=sr.getTime(),ssMs=ss.getTime(),nowMs=now.getTime();
  const nextSr=new Date(sr.getTime()+86400000);
  const nhLen=(nextSr.getTime()-ssMs)/12;
  let rows='';
  for(let i=1;i<=12;i++){
    const startMs=ssMs+(i-1)*nhLen;
    const planet=CHALDEAN[(dIdx+12+i-1)%7];
    const pp=P[planet];
    const isCur=i===currentHourNum&&isNight;
    const isPast=nowMs>startMs+nhLen;
    const timeStr=new Date(startMs).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    rows+=`<div class="hr-row${isCur?' cur':''}${isPast?' past':''}">
      <span class="hr-n">${i}</span>
      <span class="hr-t">${timeStr}</span>
      <span class="hr-s" style="color:${pp.col}">${pp.sym}</span>
      <span class="hr-p" style="color:${isCur?'#C9A84C':'#c8bfdf'}">${planet}</span>
      ${isCur?'<span class="hr-badge">Now</span>':''}
    </div>`;
  }
  return rows;
}

function fmtT(d){try{return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch(e){return'--:--';}}

// ── Location & sun times ───────────────────────────────────────
function fetchSunTimes(lat,lng,cb){
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=sunrise,sunset&timezone=auto&forecast_days=1`)
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(d=>{
      if(d.daily&&d.daily.sunrise[0]&&d.daily.sunset[0]){
        cb(new Date(d.daily.sunrise[0]),new Date(d.daily.sunset[0]),null);
      } else cb(null,null,'Data error');
    })
    .catch(()=>cb(null,null,'Network error. Please check connection.'));
}

function useGeolocation(){
  showLoad('hora-tab','Reading your position...');
  if(!navigator.geolocation){showErr('hora-tab','Location not available on this device.');return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      fetchSunTimes(pos.coords.latitude,pos.coords.longitude,(sr,ss,err)=>{
        if(err){showErr('hora-tab',err);return;}
        sunData={sr,ss};calcState(sr,ss);renderHora();
      });
    },
    e=>{
      const msgs={1:'Location access denied. Please allow in browser settings.',2:'Location unavailable.',3:'Location timed out.'};
      showErr('hora-tab',msgs[e.code]||'Location error. Please try again.');
    },
    {timeout:12000,maximumAge:600000}
  );
}

function resetLoc(){sunData=null;currentPlanet=null;renderHora();}
function refreshNow(){
  if(!sunData){renderHora();return;}
  showLoad('hora-tab','Refreshing...');
  setTimeout(()=>{calcState(sunData.sr,sunData.ss);renderHora();},300);
}

function showLoad(id,msg){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="load"><div style="font-size:44px;color:#C9A84C;margin-bottom:14px">✦</div><div style="font-size:13px;color:#c8bfdf">${msg}</div></div>`;}

    <div style="margin-bottom:14px">
      <textarea id="j-input" placeholder="Write freely. This is your space..." rows="5"></textarea>
      <button class="btn" style="margin-top:10px" onclick="saveEntry()">Seal This Entry</button>
    </div>

    ${currentTier==='free'?`<div style="background:rgba(138,75,200,0.05);border:1px solid rgba(138,75,200,0.2);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center">
      <div style="font-size:13px;color:#c8bfdf;font-style:italic;line-height:1.75;margin-bottom:10px">You have logged how you feel.<br>Upgrade to <strong style="color:#b085e8">Seeker</strong> to discover why — and watch the pattern reveal itself over time.</div>
      <button onclick="alert('Seeker tier coming soon!')" style="padding:10px 20px;background:linear-gradient(135deg,#3d1f8e,#2a1060);border:1px solid rgba(138,75,200,0.4);border-radius:20px;color:#b085e8;font-size:12px;cursor:pointer;font-family:inherit">Unlock Seeker — $4.99 / month</button>
    </div>`:''}

    ${journalEntries.length>0?`<div><span class="lbl">Your Energy Log</span>${entries}</div>`:''}

  </div>`;
}

function saveEntry(){
  try{
    const inp=document.getElementById('j-input');
    const feel=document.getElementById('feel-sel');
    if(!inp||!inp.value.trim())return;
    journalEntries.unshift({text:inp.value.trim(),date:new Date().toLocaleDateString(),planet:currentPlanet||'',feeling:feel?feel.value:''});
    renderJournal();
  }catch(e){}
}

// ── Tab switching ──────────────────────────────────────────────
function switchTab(name){
  currentTab=name;
  ['hora','moon','journal'].forEach(t=>{
    const el=document.getElementById(t+'-tab');
    const btn=document.getElementById('btn-'+t);
    if(el)el.style.display=t===name?'block':'none';
    if(btn)btn.classList.toggle('active',t===name);
  });
  if(name==='moon')renderMoon();
  if(name==='journal')renderJournal();
}

// ── Init ───────────────────────────────────────────────────────
renderHora();
</script>
</body>
</html>
