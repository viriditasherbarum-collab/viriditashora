// Moon
function getMoonPhase(d){
  var ref=new Date('2026-05-16T03:00:00Z').getTime();
  var b=((d.getTime()-ref)/86400000%29.530588861)/29.530588861;
  if(b<0)b+=1;
  var idx=Math.round(b*8)%8;
  var ph=MOON_PHASES[idx];
  return{n:ph.n,s:ph.s,m:ph.m,c:ph.c,illum:Math.round((1-Math.cos(b*2*Math.PI))/2*100)};
}
function getMoonSign(d){
  var signs=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  var syms=['\u2648','\u2649','\u264a','\u264b','\u264c','\u264d','\u264e','\u264f','\u2650','\u2651','\u2652','\u2653'];
  var cols=['#C9784C','#6B8F71','#6B8FAF','#4C9090','#C9784C','#6B8F71','#6B8FAF','#4C9090','#C9784C','#6B8F71','#6B8FAF','#4C9090'];
  var elems=['Fire','Earth','Air','Water','Fire','Earth','Air','Water','Fire','Earth','Air','Water'];
  var ref=new Date('2026-05-16T03:00:00Z').getTime();
  var i=((Math.floor(((d.getTime()-ref)/86400000/27.321661*12)+1)%12)+12)%12;
  return{name:signs[i],sym:syms[i],col:cols[i],elem:elems[i]};
}

function getDayOfYear(){
  var now=new Date();
  return Math.floor((now.getTime()-new Date(now.getFullYear(),0,0).getTime())/86400000);
}
function getCurrentPair(planet,hourNum){
  if(!planet||!P[planet])return null;
  var pairs=P[planet].pairs;
  return pairs[(getDayOfYear()+hourNum)%pairs.length];
}
function getDailyAffirmation(planet){
  if(!planet||!P[planet])return '';
  var pairs=P[planet].pairs;
  return pairs[getDayOfYear()%pairs.length].aff;
}
function getRotatingPsalm(planet){
  if(!P[planet])return '';
  var week=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,1).getTime())/604800000);
  return P[planet].psalms[week%3];
}
function getJournalPrompt(planet){
  if(!JOURNAL_PROMPTS[planet])return '';
  var prompts=JOURNAL_PROMPTS[planet];
  return prompts[getDayOfYear()%prompts.length];
}

// Planetary hours
function calcState(sr,ss){
  try{
    var now=new Date(),dow=now.getDay(),dIdx=DAY_IDX[dow];
    var srMs=sr.getTime(),ssMs=ss.getTime(),nowMs=now.getTime();
    if(nowMs>=srMs&&nowMs<ssMs){
      isNight=false;
      var hLen=(ssMs-srMs)/12;
      var hNum=Math.min(12,Math.floor((nowMs-srMs)/hLen)+1);
      currentHourNum=hNum;
      currentPlanet=CHALDEAN[(dIdx+hNum-1)%7];
    }else{
      isNight=true;
      var isBefore=nowMs<srMs;
      var tmrDow=isBefore?dow:(dow+1)%7;
      currentPlanet=CHALDEAN[DAY_IDX[tmrDow]];
      currentHourNum=1;
    }
  }catch(e){currentPlanet='Sun';currentHourNum=1;isNight=false;}
}

function buildHourList(sr,ss,forTmr,showNight){
  try{
    var now=new Date();
    var isBefSr=sunData&&now.getTime()<sunData.sr.getTime();
    var targetDow=forTmr?(isBefSr?now.getDay():(now.getDay()+1)%7):now.getDay();
    var dIdx=DAY_IDX[targetDow];
    var baseSr=forTmr?new Date(sr.getTime()+86400000):sr;
    var baseSs=forTmr?new Date(ss.getTime()+86400000):ss;
    var srMs=baseSr.getTime(),ssMs=baseSs.getTime(),nowMs=now.getTime();
    var hLen=(ssMs-srMs)/12;
    var rows='';
    for(var i=1;i<=12;i++){
      var startMs=srMs+(i-1)*hLen;
      var planet=CHALDEAN[(dIdx+i-1)%7];
      var pp=P[planet];
      var isCur=!isNight&&!forTmr&&i===currentHourNum;
      var isPast=!forTmr&&nowMs>startMs+hLen;
      var isFut=!isPast&&!isCur&&!forTmr;
      var t=new Date(startMs).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      var cls='hr-row'+(isCur?' cur':'')+(isPast?' past':'')+(isFut?' fut':'');
      rows+='<div class="'+cls+'"><span class="hr-n">'+i+'</span><span class="hr-t">'+(isFut?'--:--':t)+'</span><span class="hr-s" style="color:'+pp.col+'">'+pp.sym+'</span><span class="hr-p" style="color:'+(isCur?'#C9A84C':isPast?'#5a4e7a':'#c8bfdf')+'">'+planet+'</span>'+(isCur?'<span class="hr-badge">Now</span>':'')+'</div>';
    }
    if(showNight){
      var nextSr=new Date(sr.getTime()+86400000);
      var nhLen=(nextSr.getTime()-ss.getTime())/12;
      rows+='<div style="font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#6a5e8a;padding:10px 0 6px">Night Hours</div>';
      for(var j=1;j<=12;j++){
        var nStart=ss.getTime()+(j-1)*nhLen;
        var nPlanet=CHALDEAN[(DAY_IDX[now.getDay()]+12+j-1)%7];
        var npp=P[nPlanet];
        var nIsCur=isNight&&j===currentHourNum;
        var nIsPast=nowMs>nStart+nhLen;
        var nT=new Date(nStart).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        var nCls='hr-row'+(nIsCur?' cur':'')+(nIsPast?' past':'');
        rows+='<div class="'+nCls+'"><span class="hr-n">'+j+'</span><span class="hr-t">'+nT+'</span><span class="hr-s" style="color:'+npp.col+'">'+npp.sym+'</span><span class="hr-p" style="color:'+(nIsCur?'#C9A84C':nIsPast?'#5a4e7a':'#c8bfdf')+'">'+nPlanet+'</span>'+(nIsCur?'<span class="hr-badge">Now</span>':'')+'</div>';
      }
    }else{
      rows+='<div style="margin-top:10px;padding:12px;background:rgba(138,75,200,0.06);border:1px solid rgba(138,75,200,0.18);border-radius:10px;text-align:center"><div style="font-size:12px;color:#8060b8;margin-bottom:4px">Want tools for each hour?</div><div style="font-size:11px;color:#5a4e7a;margin-bottom:8px">Psalm, candle, herb, crystal and ritual updated every hour</div><button onclick="doSignup(\'seeker\')" style="font-size:11px;padding:6px 16px;background:rgba(138,75,200,0.12);border:1px solid rgba(138,75,200,0.25);border-radius:20px;color:#8060b8;cursor:pointer;font-family:inherit;touch-action:manipulation">Upgrade to Seeker</button></div>';
    }
    return rows;
  }catch(e){return '';}
}

// Notifications
function showNotif(planet,pair){
  var p=P[planet];if(!p)return;
  document.getElementById('n-sym').textContent=p.sym;
  document.getElementById('n-sym').style.color=p.col;
  document.getElementById('n-title').textContent=planet+' Hour';
  document.getElementById('n-title').style.color=p.col;
  document.getElementById('n-body').textContent=pair?pair.aff:p.notif;
  var el=document.getElementById('notif');
  el.classList.remove('hide');el.classList.add('show');
  if(notifTimer)clearTimeout(notifTimer);
  notifTimer=setTimeout(hideNotif,8000);
}
function hideNotif(){
  var el=document.getElementById('notif');
  el.classList.add('hide');
  setTimeout(function(){el.classList.remove('show','hide');},350);
}

// Clock
function updateClock(){
  var el=document.getElementById('clock');
  if(el){var now=new Date();el.textContent=DAYS[now.getDay()]+' \u00b7 '+now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
}
function startRefresh(){
  if(autoTimer)clearInterval(autoTimer);
  autoTimer=setInterval(function(){
    updateClock();
    if(sunData){
      var prev=currentPlanet;
      calcState(sunData.sr,sunData.ss);
      if(currentPlanet&&currentPlanet!==prev&&currentPlanet!==lastNotifPlanet){
        lastNotifPlanet=currentPlanet;
        var pair=getCurrentPair(currentPlanet,currentHourNum);
        showNotif(currentPlanet,pair);
      }
      if(currentTab==='hora')renderHora();
    }
  },60000);
}
updateClock();startRefresh();

function fetchSun(lat,lng,cb){
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lng+'&daily=sunrise,sunset&timezone=auto&forecast_days=1')
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(d){
      if(d.daily&&d.daily.sunrise[0])cb(new Date(d.daily.sunrise[0]),new Date(d.daily.sunset[0]),null);
      else cb(null,null,'Could not read sun times.');
    }).catch(function(){cb(null,null,'Network error. Please check your connection.');});
}
function useGeo(){
  showLoad('hora-tab','Reading your position...');
  if(!navigator.geolocation){showErr('hora-tab','Location not supported. Please select your city below.');return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      fetchSun(pos.coords.latitude,pos.coords.longitude,function(sr,ss,err){
        if(err){showErr('hora-tab',err);return;}
        sunData={sr:sr,ss:ss};calcState(sr,ss);lastNotifPlanet=currentPlanet;renderHora();
      });
    },
    function(){currentPlanet=null;renderHora();},
    {timeout:12000,maximumAge:600000}
  );
}
function useCity(){
  var sel=document.getElementById('tz-sel');
  if(!sel||!sel.value){alert('Please select your city first.');return;}
  var parts=sel.value.split('|');
  var lat=parseFloat(parts[0]),lng=parseFloat(parts[1]);
  if(isNaN(lat)||isNaN(lng)){alert('Please select your city first.');return;}
  showLoad('hora-tab','Calculating your planetary hours...');
  fetchSun(lat,lng,function(sr,ss,err){
    if(err){showErr('hora-tab',err);return;}
    sunData={sr:sr,ss:ss};calcState(sr,ss);lastNotifPlanet=currentPlanet;renderHora();
  });
}

function doSignup(tierKey){
  var planId=PLAN_IDS[tierKey];
  if(window.$memberstackDom){
    window.$memberstackDom.openModal('SIGNUP',{planId:planId})
      .then(function(){checkMembership();})
      .catch(function(){});
  }
}
function doLogin(){
  if(window.$memberstackDom){
    window.$memberstackDom.openModal('LOGIN')
      .then(function(){checkMembership();})
      .catch(function(){});
  }
}
function doLogout(){
  if(window.$memberstackDom){
    window.$memberstackDom.logout().then(function(){
      currentMember=null;currentTier='free';
      updateAuthBar();renderAll();
    });
  }
}
function manageSubscription(){
  if(window.$memberstackDom)window.$memberstackDom.openModal('PROFILE');
}
function checkMembership(){
  if(!window.$memberstackDom)return;
  window.$memberstackDom.getCurrentMember().then(function(r){
    if(!r||!r.data){currentMember=null;currentTier='free';updateAuthBar();return;}
    currentMember=r.data;
    var plans=r.data.planConnections||[];
    if(plans.some(function(p){return p.planName==='Initiate';})){currentTier='initiate';}
    else if(plans.some(function(p){return p.planName==='Seeker';})){currentTier='seeker';}
    else{currentTier='free';}
    updateAuthBar();renderAll();
  }).catch(function(){currentTier='free';updateAuthBar();});
}
function updateAuthBar(){
  var bar=document.getElementById('auth-bar');
  var app=document.getElementById('app');
  var greeting=document.getElementById('auth-greeting');
  if(!bar)return;
  if(currentMember&&!IS_PREVIEW){
    bar.classList.add('show');
    app.classList.add('has-bar');
    var email=currentMember.auth&&currentMember.auth.email?currentMember.auth.email:'';
    var name=email?email.split('@')[0]:'Member';
    var tierLabel=currentTier==='initiate'?'Initiate':currentTier==='seeker'?'Seeker':'Free';
    if(greeting)greeting.textContent=name+' \u00b7 '+tierLabel;
  }else{
    bar.classList.remove('show');
    app.classList.remove('has-bar');
  }
}

    +'<div style="background:linear-gradient(135deg,rgba(20,12,50,0.6),rgba(10,5,28,0.6));border:1px solid '+moon.c+'40;border-radius:16px;padding:18px;margin-bottom:12px"><div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:'+moon.c+';margin-bottom:6px">Moon Guidance</div><div style="font-size:16px;color:#e8e0d0;margin-bottom:8px">'+guide.title+'</div><div style="font-size:13px;color:#c8bfdf;line-height:1.72;margin-bottom:14px">'+guide.body+'</div><div style="background:'+moon.c+'12;border-radius:10px;padding:12px;border-left:3px solid '+moon.c+'60"><div style="font-size:10px;letter-spacing:.12em;color:'+moon.c+';text-transform:uppercase;margin-bottom:5px">Your action for today</div><div style="font-size:13px;color:#c8bfdf;line-height:1.6">'+guide.action+'</div></div></div>'
    +'<div class="card" style="border-color:'+dp.col+'30"><span class="lbl">Today\'s Ruling Planet</span><div style="display:flex;align-items:center;gap:12px"><div style="font-size:30px;color:'+dp.col+';line-height:1">'+dp.sym+'</div><div><div style="font-size:15px;color:#e8e0d0">'+DAYS[dow]+' &mdash; '+dayRuler+'</div><div style="font-size:12px;color:#9d8fbf;font-style:italic;margin-top:2px">'+dp.energy+'</div></div></div></div>'
    +'</div>';
}

function renderJournal(){
  var tab=document.getElementById('journal-tab');if(!tab)return;
  var dow=new Date().getDay();
  var dayRuler=CHALDEAN[DAY_IDX[dow]];
  var moon=getMoonPhase(new Date());
  var prompt=getJournalPrompt(dayRuler);
  var feelGroups=[{g:'-- HEAVY --',f:[]},{g:null,f:['Angry','Fearful','Desperate','Despairing','Grief-stricken','Hopeless','Numb','Bitter','Resentful','Heartbroken']},{g:'-- ANXIOUS --',f:[]},{g:null,f:['Anxious','Overwhelmed','Scattered','Restless','Unsettled','On edge','Disconnected']},{g:'-- LOW ENERGY --',f:[]},{g:null,f:['Heavy','Drained','Exhausted','Blocked','Stuck','Lost','Foggy']},{g:'-- PROCESSING --',f:[]},{g:null,f:['Confused','Searching','Uncertain','Reflective','Conflicted']},{g:'-- POSITIVE --',f:[]},{g:null,f:['Peaceful','Grateful','Centered','Clear','Hopeful','Energized','Grounded','Joyful']}];
  var feelOpts=feelGroups.map(function(g){if(g.g)return '<option disabled style="color:#C9A84C;background:#0f0d24;font-weight:bold">'+g.g+'</option>';return g.f.map(function(f){return '<option value="'+f+'" style="color:#e8e0d0;background:#0f0d24">'+f+'</option>';}).join('');}).join('');
  var entries=journalEntries.slice(0,12).map(function(e){return '<div style="background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:6px;gap:8px;flex-wrap:wrap"><span style="font-size:11px;color:#C9A84C">'+(e.planet?e.planet+' Hour':'')+'</span><span style="font-size:11px;color:#5a4e7a">'+e.date+'</span></div>'+(e.feeling?'<div style="margin-bottom:7px"><span style="font-size:11px;padding:2px 9px;border-radius:20px;background:rgba(201,168,76,0.1);color:#C9A84C">'+e.feeling+'</span></div>':'')+'<div style="font-size:13px;color:#9d8fbf;font-style:italic;line-height:1.6">'+e.text+'</div></div>';}).join('');

  tab.innerHTML='<div class="fade-in">'
    +'<div style="background:linear-gradient(135deg,rgba(35,20,80,0.5),rgba(18,10,45,0.5));border:1px solid rgba(212,56,122,0.25);border-radius:16px;padding:18px;margin-bottom:12px"><div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#D4387A;margin-bottom:4px">Today\'s Reflection</div><div style="font-size:11px;color:#5a4e7a;margin-bottom:10px">'+moon.s+' '+moon.n+' &middot; '+dayRuler+' Day</div><div style="font-size:15px;color:#c8bfdf;font-style:italic;line-height:1.82;margin-bottom:10px">&ldquo;'+prompt+'&rdquo;</div><div style="font-size:12px;color:#4a3e6a">Take your time. There is no wrong answer.</div></div>'
    +'<div class="card"><span class="lbl">Write Here</span><textarea id="j-in" placeholder="Write freely. This space belongs to you..." rows="6"></textarea><div style="margin-top:10px;display:flex;gap:8px;align-items:stretch"><div style="position:relative;flex:1.2"><select id="feel-sel" style="width:100%;height:100%;min-height:44px;background:#0f0d24;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#7a6e8a;font-family:inherit;font-size:13px;padding:10px 32px 10px 12px;-webkit-appearance:none;appearance:none;"><option value="" style="background:#0f0d24">How do you feel?</option>'+feelOpts+'</select><div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#C9A84C;font-size:13px;pointer-events:none">&#9660;</div></div><button class="btn" onclick="saveEntry()" style="flex:1;padding:10px;font-size:12px;white-space:nowrap">Seal Entry</button></div></div>'
    +'<div style="background:rgba(138,75,200,0.05);border:1px solid rgba(138,75,200,0.15);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center"><div style="font-size:13px;color:#c8bfdf;font-style:italic;line-height:1.75;margin-bottom:10px">Upgrade to <strong style="color:#b085e8">Seeker</strong> to get prompts that shift with every planetary hour.</div><button onclick="doSignup(\'seeker\')" style="padding:9px 18px;background:rgba(138,75,200,0.1);border:1px solid rgba(138,75,200,0.28);border-radius:20px;color:#8060b8;font-size:12px;cursor:pointer;font-family:inherit;touch-action:manipulation">Unlock Seeker &mdash; $4.99 / month</button></div>'
    +(journalEntries.length>0?'<div><span class="lbl">Your Energy Log</span>'+entries+'</div>':'')
    +'</div>';
}

function saveEntry(){
  try{
    var inp=document.getElementById('j-in');
    var feel=document.getElementById('feel-sel');
    if(!inp||!inp.value.trim())return;
    journalEntries.unshift({text:inp.value.trim(),date:new Date().toLocaleDateString(),planet:currentPlanet||'',feeling:feel?feel.value:''});
    inp.value='';if(feel)feel.value='';
    renderJournal();
  }catch(e){}
}

function switchTab(name){
  currentTab=name;
  ['hora','ruling','moon','journal'].forEach(function(t){
    var el=document.getElementById(t+'-tab');
    var btn=document.getElementById('btn-'+t);
    if(el)el.style.display=t===name?'block':'none';
    if(btn)btn.classList.toggle('active',t===name);
  });
  if(name==='ruling')renderRuling();
  if(name==='moon')renderMoon();
  if(name==='journal')renderJournal();
}
function renderAll(){renderHora();if(currentTab==='ruling')renderRuling();if(currentTab==='moon')renderMoon();if(currentTab==='journal')renderJournal();}

// Init
renderHora();
</script>
